---
- name: Assert cert-manager reset is running on the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_node.cluster_init | bool
    fail_msg: cert_manager reset must run on the initial K3s server where k3s_node.cluster_init=true.
    success_msg: "Resetting cert-manager from the bootstrap K3s server"

- name: Check cert-manager manifest files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /var/lib/rancher/k3s/server/manifests/cert-manager-clusterissuer.yaml
    - /var/lib/rancher/k3s/server/manifests/cert-manager-cloudflare-secret.yaml
    - /var/lib/rancher/k3s/server/manifests/cert-manager-helmchart.yaml
  register: cert_manager_reset_manifest_stats

- name: Delete cert-manager resources from manifests
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - delete
      - -f
      - "{{ item.stat.path }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop: "{{ cert_manager_reset_manifest_stats.results }}"
  when: item.stat.exists
  changed_when: true
  failed_when: false

- name: Remove cert-manager manifest files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/k3s/server/manifests/cert-manager-clusterissuer.yaml
    - /var/lib/rancher/k3s/server/manifests/cert-manager-cloudflare-secret.yaml
    - /var/lib/rancher/k3s/server/manifests/cert-manager-helmchart.yaml
