---
argument_specs:
  main:
    short_description: Bootstrap the initial K3s server node or join additional server nodes.
    options:
      k3s:
        type: dict
        required: true
        options:
          version:
            type: str
            required: true
            description:
              - Exact K3s version to install on the server node.
          token:
            type: str
            required: true
            no_log: true
            description:
              - Shared cluster token used for server and future agent joins.
          registration_vip:
            type: str
            required: true
            description:
              - Stable registration VIP that additional K3s servers use when joining the cluster.
          tls_sans:
            type: list
            elements: str
            required: true
            description:
              - Additional API certificate SANs that the server must advertise.
      k3s_node:
        type: dict
        required: true
        options:
          cluster_init:
            type: bool
            required: true
            description:
              - Whether the target node should initialize the embedded etcd cluster.
      k3s_server:
        type: dict
        required: true
        options:
          disable_components:
            type: list
            elements: str
            required: true
            description:
              - Built-in K3s components to disable on the server node.
          secrets_encryption:
            type: bool
            required: true
            description:
              - Whether K3s secrets encryption at rest should be enabled.
          secrets_encryption_provider:
            type: str
            required: true
            description:
              - Encryption provider to use for K3s secrets encryption.
          protect_kernel_defaults:
            type: bool
            required: true
            description:
              - Whether K3s should fail startup when required kubelet kernel defaults are not met.
          registry_mirror:
            type: dict
            required: true
            options:
              enabled:
                type: bool
                required: true
                description:
                  - Whether to render K3s containerd registry configuration.
              embedded_registry:
                type: bool
                required: false
                description:
                  - Whether to enable the K3s embedded distributed registry mirror.
              disable_default_registry_endpoint:
                type: bool
                required: true
                description:
                  - Whether to disable fallback to upstream registry endpoints for configured mirrors.
              mirrors:
                type: dict
                required: true
                description:
                  - Mirror entries to render into /etc/rancher/k3s/registries.yaml.
              configs:
                type: dict
                required: true
                description:
                  - Optional registry auth and TLS config to render into /etc/rancher/k3s/registries.yaml.
          extra_args:
            type: list
            elements: str
            required: true
            description:
              - Additional K3s server options in key=value form for config rendering.
          kube_apiserver_args:
            type: list
            elements: str
            required: true
            description:
              - Additional kube-apiserver arguments rendered as K3s kube-apiserver-arg list items.
          kubelet_args:
            type: list
            elements: str
            required: true
            description:
              - Additional kubelet arguments rendered as K3s kubelet-arg list items.
          kubelet_config:
            type: dict
            required: true
            options:
              image_maximum_gc_age:
                type: str
                required: true
                description:
                  - Maximum age before kubelet garbage-collects unused images.
          audit_logging:
            type: dict
            required: true
            options:
              enabled:
                type: bool
                required: true
                description:
                  - Whether to configure Kubernetes API audit logging.
              policy_file:
                type: str
                required: true
                description:
                  - Path to the Kubernetes audit policy file.
              log_path:
                type: str
                required: true
                description:
                  - Path where the API server should write audit logs.
              log_maxage:
                type: int
                required: true
                description:
                  - Maximum number of days to retain audit log files.
              log_maxbackup:
                type: int
                required: true
                description:
                  - Maximum number of audit log backup files to retain.
              log_maxsize:
                type: int
                required: true
                description:
                  - Maximum audit log file size in megabytes before rotation.
