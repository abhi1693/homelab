---
- name: Assert K3s agent inputs are configured
  ansible.builtin.assert:
    that:
      - k3s.registration_vip | trim != ''
      - k3s_agent.registry_mirror is defined
      - not (k3s_agent.registry_mirror.disable_default_registry_endpoint | bool)
        or (k3s_agent.registry_mirror.enabled | bool)
    fail_msg: Expected K3s agent registration and registry mirror inputs to be configured.
    success_msg: "K3s agent will join through {{ k3s.registration_vip }}"

- name: Assert K3s agent kubelet args use key=value format
  ansible.builtin.assert:
    that:
      - "'=' in item"
      - item.split('=', 1)[0] | trim != ''
      - item.split('=', 1)[1] | trim != ''
    fail_msg: "Expected k3s_agent.kubelet_args item in key=value form: {{ item }}"
    success_msg: "K3s agent kubelet arg {{ item }} is valid"
  loop: "{{ k3s_agent.kubelet_args }}"

- name: Wait for K3s registration endpoint before joining worker
  ansible.builtin.wait_for:
    host: "{{ k3s.registration_vip }}"
    port: 6443
    timeout: 300

- name: Ensure K3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render K3s registries config
  ansible.builtin.template:
    src: registries.yaml.j2
    dest: /etc/rancher/k3s/registries.yaml
    owner: root
    group: root
    mode: "0600"
  when: k3s_agent.registry_mirror.enabled | bool
  notify: Restart k3s-agent

- name: Remove K3s registries config when registry mirror is disabled
  ansible.builtin.file:
    path: /etc/rancher/k3s/registries.yaml
    state: absent
  when: not (k3s_agent.registry_mirror.enabled | bool)
  notify: Restart k3s-agent

- name: Render K3s agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart k3s-agent

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    owner: root
    group: root
    mode: "0755"

- name: Check whether K3s binary is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary_stat

- name: Read installed K3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_version_output
  changed_when: false
  when: k3s_binary_stat.stat.exists

- name: Record installed K3s version
  ansible.builtin.set_fact:
    k3s_installed_version: >-
      {{
        ((k3s_version_output.stdout_lines | first).split()[2]) | default('')
      }}
  when: k3s_binary_stat.stat.exists

- name: Install or update K3s agent binary
  ansible.builtin.command: /usr/local/bin/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s.version }}"
    INSTALL_K3S_EXEC: agent
  when:
    - not k3s_binary_stat.stat.exists
      or (k3s_installed_version | default('')) != k3s.version

- name: Ensure K3s agent service is enabled and started
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
    daemon_reload: true
