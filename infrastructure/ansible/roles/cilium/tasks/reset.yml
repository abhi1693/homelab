---
- name: Assert Cilium reset is running on the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_node.cluster_init | bool
    fail_msg: cilium reset must run on the initial K3s server where k3s_node.cluster_init=true.
    success_msg: "Resetting Cilium from the bootstrap K3s server"

- name: Check bundled Traefik and Cilium exposure manifest files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-advertisement.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-cluster-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-peer-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-lb-ip-pool.yaml
  register: cilium_reset_manifest_stats

- name: Delete bundled Traefik and Cilium exposure resources from manifests
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - delete
      - -f
      - "{{ item.stat.path }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop: "{{ cilium_reset_manifest_stats.results }}"
  when: item.stat.exists
  changed_when: true
  failed_when: false

- name: Remove bundled Traefik and Cilium exposure manifest files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-advertisement.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-cluster-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-bgp-peer-config.yaml
    - /var/lib/rancher/k3s/server/manifests/cilium-lb-ip-pool.yaml

- name: Check Cilium CLI binary path
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli_binary_stat

- name: Uninstall Cilium from the cluster
  ansible.builtin.command:
    argv:
      - /usr/local/bin/cilium
      - uninstall
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: cilium_cli_binary_stat.stat.exists
  changed_when: true
