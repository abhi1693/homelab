---
- name: Run k3s_agent entrypoint
  hosts: "{{ k3s_agent_target_hosts | default('k3s_workers') }}"
  become: true
  gather_facts: true

  vars:
    k3s_agent_selected_entrypoint: "{{ k3s_agent_entrypoint | default('main') }}"

  pre_tasks:
    - name: Assert k3s_agent entrypoint is supported
      ansible.builtin.assert:
        that:
          - k3s_agent_selected_entrypoint in ['main', 'validation', 'reset']
        fail_msg: "Unsupported k3s_agent entrypoint {{ k3s_agent_selected_entrypoint }}"
        success_msg: "Running k3s_agent entrypoint {{ k3s_agent_selected_entrypoint }}"

  tasks:
    - name: Run k3s_agent main entrypoint
      ansible.builtin.include_role:
        name: k3s_agent
      when: k3s_agent_selected_entrypoint == 'main'

    - name: Run k3s_agent alternate entrypoint
      ansible.builtin.include_role:
        name: k3s_agent
        tasks_from: "{{ k3s_agent_selected_entrypoint }}"
        rolespec_validate: false
      when: k3s_agent_selected_entrypoint != 'main'

  post_tasks:
    - name: Restart k3s_agent if requested by handlers
      ansible.builtin.meta: flush_handlers
