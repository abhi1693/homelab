apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatcharr
  namespace: media
  labels:
    app.kubernetes.io/name: dispatcharr
    app.kubernetes.io/part-of: media-stack
spec:
  ingressClassName: traefik
  rules:
    - host: dispatcharr.media.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dispatcharr
                port:
                  name: http

