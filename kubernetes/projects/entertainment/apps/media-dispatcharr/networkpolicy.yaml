---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dispatcharr-network-boundary
  namespace: media
  labels:
    app.kubernetes.io/name: dispatcharr
    app.kubernetes.io/part-of: media-stack
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dispatcharr
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: jellyfin
              app.kubernetes.io/name: jellyfin
      ports:
        - protocol: TCP
          port: 9191
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgresql
          podSelector:
            matchLabels:
              cnpg.io/poolerName: postgresql-pooler-dispatcharr-rw
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
