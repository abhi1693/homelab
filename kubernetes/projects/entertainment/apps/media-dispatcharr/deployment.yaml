apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr
  namespace: media
  labels:
    app.kubernetes.io/name: dispatcharr
    app.kubernetes.io/part-of: media-stack
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatcharr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatcharr
        app.kubernetes.io/part-of: media-stack
        home-lab.io/topology-group: heavy-media
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: registry.home/docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
        - name: dispatcharr
          # renovate: datasource=github-releases depName=Dispatcharr/Dispatcharr
          image: registry.home/ghcr.io/dispatcharr/dispatcharr:0.27.2
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: dispatcharr
          env:
            # Empty values clear the legacy literal fields during client-side apply.
            - name: POSTGRES_DB
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: dbname
            - name: POSTGRES_USER
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: password
          ports:
            - name: http
              containerPort: 9191
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 768Mi
            limits:
              memory: 3Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 180
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
        - name: celery
          # renovate: datasource=github-releases depName=Dispatcharr/Dispatcharr
          image: registry.home/ghcr.io/dispatcharr/dispatcharr:0.27.2
          imagePullPolicy: IfNotPresent
          command:
            - /app/docker/entrypoint.celery.sh
          envFrom:
            - configMapRef:
                name: dispatcharr
          env:
            # Empty values clear the legacy literal fields during client-side apply.
            - name: POSTGRES_DB
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: dbname
            - name: POSTGRES_USER
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              value: ""
              valueFrom:
                secretKeyRef:
                  name: dispatcharr-postgresql
                  key: password
            - name: DJANGO_SETTINGS_MODULE
              value: dispatcharr.settings
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 25m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dispatcharr-data
        - name: tmp
          emptyDir: {}
