---
name: media-metube
defaultNamespace: media
labels:
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/ghcr.io/alexta69/metube
    tagName: metube
    interval: 10m0s
    policy:
      semver:
        range: ">=2026.0.0 <2027.0.0"
  - image: registry.home/docker.io/library/busybox
    tagName: metube-busybox
    interval: 10m0s
    policy:
      semver:
        range: ">=1.0.0 <2.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: media-storage
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      name: metube-state
      namespace: media
      jsonPointers:
        - /spec/volumeName
helm:
  takeOwnership: true
