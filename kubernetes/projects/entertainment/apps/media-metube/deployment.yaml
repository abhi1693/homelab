apiVersion: apps/v1
kind: Deployment
metadata:
  name: metube
  namespace: media
  labels:
    app.kubernetes.io/name: metube
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metube
        app.kubernetes.io/part-of: media-stack
        home-lab.io/project-slug: entertainment
        home-lab.io/topology-group: heavy-media
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-youtube-library
          # renovate: datasource=docker depName=docker.io/library/busybox
          image: registry.home/docker.io/library/busybox:1.38
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /media/youtube/videos /media/youtube/audio /media/youtube/.metube-tmp
              for path in /media/youtube /media/youtube/videos /media/youtube/audio /media/youtube/.metube-tmp; do
                chown 568:568 "$path" 2>/dev/null || true
                chmod g+rwX "$path" 2>/dev/null || true
              done
          resources:
            requests:
              cpu: 2m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: youtube-library
              mountPath: /media
      containers:
        - name: metube
          # renovate: datasource=docker depName=ghcr.io/alexta69/metube
          image: registry.home/ghcr.io/alexta69/metube:2026.06.28
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: metube
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 192Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: state
              mountPath: /config
            - name: metube-config
              mountPath: /etc/metube
              readOnly: true
            - name: youtube-library
              mountPath: /downloads
              subPath: youtube
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: metube-state
        - name: metube-config
          configMap:
            name: metube
        - name: youtube-library
          persistentVolumeClaim:
            claimName: media-library-nas
        - name: tmp
          emptyDir: {}
