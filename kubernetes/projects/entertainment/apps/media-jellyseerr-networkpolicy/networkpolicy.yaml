---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jellyseerr-network-boundary
  namespace: media
  labels:
    app.kubernetes.io/name: jellyseerr
    app.kubernetes.io/part-of: media-stack
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: jellyseerr
      app.kubernetes.io/name: seerr-chart
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: jellyfin
              app.kubernetes.io/name: jellyfin
      ports:
        - protocol: TCP
          port: 5055
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: jellyfin
              app.kubernetes.io/name: jellyfin
      ports:
        - protocol: TCP
          port: 8096
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: sonarr
              app.kubernetes.io/name: sonarr
      ports:
        - protocol: TCP
          port: 8989
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: radarr
              app.kubernetes.io/name: radarr
      ports:
        - protocol: TCP
          port: 7878
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ryokan
      ports:
        - protocol: TCP
          port: 8978
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
