---
name: sonarr-helmop
defaultNamespace: fleet-local
labels:
  app.kubernetes.io/name: sonarr
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/oci.trueforge.org/containerforge/sonarr
    tagName: sonarr
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=4.0.0 <5.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: media-helm-repositories
  - name: media-storage
