TZ: Asia/Kolkata
chartContext:
  appUrl: http://sonarr.media.home
image:
  repository: registry.home/oci.trueforge.org/containerforge/sonarr
  pullPolicy: IfNotPresent
  tag: 4.0.18 # {"$imagescan": "sonarr:tag"}
imagePullSecret:
  harbor-registry:
    enabled: true
    existingSecret: harbor-registry
global:
  fallbackDefaults:
    storageClass: longhorn
    pvcRetain: true
podOptions:
  defaultAffinity: false
  nodeSelector:
    kubernetes.io/arch: arm64
resources:
  requests:
    cpu: 125m
    memory: 576Mi
  limits:
    memory: 864Mi
ingress:
  main:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: sonarr.media.home
        paths:
          - path: /
            pathType: Prefix
    tls: []
workload:
  main:
    podSpec:
      automountServiceAccountToken: false
      labels:
        home-lab.io/topology-group: heavy-media
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
persistence:
  config:
    size: 256Mi
    storageClass: longhorn
    volumeName: pvc-b7e4d48a-867b-4d63-9573-8d1a9da7bce9
  media:
    enabled: true
    type: pvc
    existingClaim: media-library-nas
    mountPath: /data
  downloads:
    enabled: true
    type: pvc
    existingClaim: media-downloads
    mountPath: /downloads
metrics:
  main:
    enabled: false
networkPolicy:
  ingress:
    enabled: true
    policyType: ingress
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                app.kubernetes.io/name: traefik
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: jellyseerr
                app.kubernetes.io/name: seerr-chart
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: jellyfin
                app.kubernetes.io/name: jellyfin
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: profilarr
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: prowlarr
                app.kubernetes.io/name: prowlarr
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: media
            podSelector:
              matchLabels:
                app.kubernetes.io/instance: qbittorrent-smart-queues
                app.kubernetes.io/name: qbittorrent-smart-queues
        ports:
          - protocol: TCP
            port: 8989
  egress:
    enabled: true
    policyType: egress
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: prowlarr
                app.kubernetes.io/name: prowlarr
        ports:
          - protocol: TCP
            port: 9696
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: qbittorrent
                app.kubernetes.io/name: qbittorrent
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: jellyfin
                app.kubernetes.io/name: jellyfin
        ports:
          - protocol: TCP
            port: 8096
      - to:
          - ipBlock:
              cidr: 0.0.0.0/0
              except:
                - 10.42.0.0/16
                - 10.43.0.0/16
