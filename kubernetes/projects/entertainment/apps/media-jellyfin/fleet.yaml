---
name: jellyfin-helmop
defaultNamespace: fleet-local
labels:
  app.kubernetes.io/name: jellyfin
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/home-lab/jellyfin
    tagName: jellyfin
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=10.0.0-0 <11.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: media-helm-repositories
  - name: media-storage
