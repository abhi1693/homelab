fullnameOverride: jellyseerr
image:
  registry: registry.home
  repository: docker.io/seerr/seerr
  # renovate: datasource=docker depName=docker.io/seerr/seerr
  tag: v3.3
  pullPolicy: IfNotPresent
extraEnv:
  - name: TZ
    value: Asia/Kolkata
  - name: NODE_OPTIONS
    value: --dns-result-order=ipv4first
serviceAccount:
  automount: false
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  privileged: false
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
nodeSelector:
  kubernetes.io/arch: arm64
resources:
  requests:
    cpu: 10m
    memory: 288Mi
  limits:
    memory: 432Mi
probes:
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 3
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
  startupProbe:
    httpGet:
      path: /api/v1/settings/public
      port: http
    failureThreshold: 60
    periodSeconds: 5
    timeoutSeconds: 3
service:
  type: ClusterIP
  port: 10241
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: requests.media.home
      paths:
        - path: /
          pathType: Prefix
  tls: []
config:
  persistence:
    existingClaim: jellyseerr-config
    size: 128Mi
    accessModes:
      - ReadWriteOnce
