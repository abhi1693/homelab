---
apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: jellyseerr
  labels:
    app.kubernetes.io/name: jellyseerr
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  defaultNamespace: media
  dependsOn:
    - name: rancher-project-entertainment
    - name: media-helm-repositories
    - name: media-storage
  labels:
    app.kubernetes.io/name: jellyseerr
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
  targets:
    - name: default
      clusterGroup: default
  targetRestrictions:
    - name: default
      clusterGroup: default
  correctDrift:
    enabled: true
    force: true
    keepFailHistory: true
  downstreamResources:
    - kind: ConfigMap
      name: jellyseerr-values
  helm:
    releaseName: jellyseerr
    repo: oci://ghcr.io/seerr-team/seerr/seerr-chart
    version: 3.7.0
    takeOwnership: true
    valuesFrom:
      - configMapKeyRef:
          name: jellyseerr-values
          namespace: fleet-local
          key: values.yaml
    waitForJobs: true
