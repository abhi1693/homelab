---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: do-squid-firewall-egress-control
  namespace: media
  labels:
    app.kubernetes.io/name: do-squid-firewall
    app.kubernetes.io/part-of: media-stack
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: do-squid-firewall
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.42.0.0/16
              - 10.43.0.0/16
