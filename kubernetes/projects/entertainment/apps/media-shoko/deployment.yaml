apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoko
  namespace: media
  labels:
    app.kubernetes.io/name: shoko
    app.kubernetes.io/part-of: media-stack
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: shoko
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shoko
        app.kubernetes.io/part-of: media-stack
        home-lab.io/topology-group: heavy-media
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shoko
          # renovate: datasource=docker depName=ghcr.io/shokoanime/server
          image: registry.home/ghcr.io/shokoanime/server:v5.3.3
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: shoko
          ports:
            - name: http
              containerPort: 8111
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 768Mi
            limits:
              memory: 3Gi
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            failureThreshold: 4
          volumeMounts:
            - name: config
              mountPath: /home/shoko/.shoko
            - name: anime
              mountPath: /mnt/anime
              subPath: anime
              readOnly: true
            - name: anime
              mountPath: /media/anime
              subPath: anime
              readOnly: true
            - name: shm
              mountPath: /dev/shm
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: shoko-config
        - name: anime
          persistentVolumeClaim:
            claimName: media-library-nas
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: tmp
          emptyDir: {}
