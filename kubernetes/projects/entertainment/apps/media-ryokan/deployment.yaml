apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryokan
  namespace: media
  labels:
    app.kubernetes.io/name: ryokan
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ryokan
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ryokan
        app.kubernetes.io/part-of: media-stack
        home-lab.io/topology-group: heavy-media
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 568
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ryokan
          # renovate: datasource=docker depName=ghcr.io/johnthreekay/ryokan
          image: registry.home/ghcr.io/johnthreekay/ryokan:1.8
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ryokan
          ports:
            - name: http
              containerPort: 8978
              protocol: TCP
          resources:
            requests:
              cpu: 75m
              memory: 512Mi
            limits:
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
            - name: downloads
              mountPath: /downloads
            - name: anime-library
              mountPath: /media/anime
              subPath: anime
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ryokan-data
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
        - name: anime-library
          persistentVolumeClaim:
            claimName: media-library-nas
        - name: tmp
          emptyDir: {}
