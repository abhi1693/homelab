TZ: Asia/Kolkata
chartContext:
  appUrl: http://flaresolverr.media.svc.cluster.local:8191
image:
  repository: registry.home/ghcr.io/flaresolverr/flaresolverr
  pullPolicy: IfNotPresent
  # renovate: datasource=github-releases depName=FlareSolverr/FlareSolverr
  tag: v3.5.0
imagePullSecret:
  harbor-registry:
    enabled: true
    existingSecret: harbor-registry
global:
  fallbackDefaults:
    storageClass: longhorn
    pvcRetain: true
podOptions:
  defaultAffinity: false
  nodeSelector:
    kubernetes.io/arch: arm64
resources:
  requests:
    cpu: 10m
    memory: 336Mi
  limits:
    cpu: 200m
    memory: 496Mi
service:
  main:
    ports:
      main:
        port: 8191
workload:
  main:
    replicas: 1
    podSpec:
      automountServiceAccountToken: false
      labels:
        home-lab.io/topology-group: heavy-media
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      containers:
        main:
          env:
            LOG_LEVEL: info
            LOG_HTML: false
            BROWSER_TIMEOUT: 60000
            TEST_URL: https://www.google.com
persistence:
  config:
    size: 1Gi
    storageClass: longhorn
    volumeName: pvc-40259cc7-df59-4f05-b811-8c909c5da4d1
networkPolicy:
  ingress:
    enabled: true
    policyType: ingress
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: prowlarr
                app.kubernetes.io/name: prowlarr
        ports:
          - protocol: TCP
            port: 8191
  egress:
    enabled: true
    policyType: egress
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
      - to:
          - ipBlock:
              cidr: 0.0.0.0/0
              except:
                - 10.42.0.0/16
                - 10.43.0.0/16
