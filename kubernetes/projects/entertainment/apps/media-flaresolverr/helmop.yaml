---
apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: flaresolverr
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  defaultNamespace: media
  namespaceLabels:
    app.kubernetes.io/part-of: media-stack
    field.cattle.io/projectId: p-rm645
  namespaceAnnotations:
    field.cattle.io/projectId: local:p-rm645
  dependsOn:
    - name: rancher-project-entertainment
    - name: media-helm-repositories
    - name: media-storage
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
  targets:
    - name: default
      clusterGroup: default
  targetRestrictions:
    - name: default
      clusterGroup: default
  correctDrift:
    enabled: true
    force: true
    keepFailHistory: true
  downstreamResources:
    - kind: ConfigMap
      name: flaresolverr-values
  helm:
    releaseName: flaresolverr
    repo: oci://oci.trueforge.org/truecharts/flaresolverr
    version: 17.6.0
    atomic: true
    timeoutSeconds: 600
    takeOwnership: true
    valuesFrom:
      - configMapKeyRef:
          name: flaresolverr-values
          namespace: fleet-local
          key: values.yaml
    waitForJobs: true
