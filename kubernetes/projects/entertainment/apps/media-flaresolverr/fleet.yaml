---
name: flaresolverr-helmop
defaultNamespace: fleet-local
labels:
  app.kubernetes.io/name: flaresolverr
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/ghcr.io/flaresolverr/flaresolverr
    tagName: flaresolverr
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=3.0.0 <4.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: media-helm-repositories
  - name: media-storage
