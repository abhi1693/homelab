---
name: media-profilarr
defaultNamespace: media
namespaceLabels:
  app.kubernetes.io/part-of: media-stack
  field.cattle.io/projectId: p-rm645
namespaceAnnotations:
  field.cattle.io/projectId: local:p-rm645
labels:
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/ghcr.io/dictionarry-hub/profilarr
    tagName: profilarr
    interval: 10m0s
    policy:
      semver:
        range: ">=2.0.0 <3.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: radarr
  - name: sonarr
diff:
  comparePatches:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      name: profilarr-config
      namespace: media
      jsonPointers:
        - /spec/volumeName
helm:
  takeOwnership: true
