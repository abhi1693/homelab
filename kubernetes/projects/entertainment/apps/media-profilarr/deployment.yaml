apiVersion: apps/v1
kind: Deployment
metadata:
  name: profilarr
  namespace: media
  labels:
    app.kubernetes.io/name: profilarr
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: profilarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: profilarr
        app.kubernetes.io/part-of: media-stack
        home-lab.io/topology-group: heavy-media
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              home-lab.io/topology-group: heavy-media
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: profilarr
          # renovate: datasource=docker depName=ghcr.io/dictionarry-hub/profilarr
          image: registry.home/ghcr.io/dictionarry-hub/profilarr:2.0.9
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: profilarr
          ports:
            - name: http
              containerPort: 6868
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 464Mi
            limits:
              memory: 688Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
        - name: parser
          image: registry.home/ghcr.io/dictionarry-hub/profilarr-parser:latest
          imagePullPolicy: Always
          ports:
            - name: parser
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              memory: 112Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: profilarr-config
        - name: tmp
          emptyDir: {}
