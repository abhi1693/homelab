---
name: prowlarr-helmop
defaultNamespace: fleet-local
labels:
  app.kubernetes.io/name: prowlarr
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
imageScans:
  - image: registry.home/oci.trueforge.org/containerforge/prowlarr
    tagName: prowlarr
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=2.0.0 <3.0.0"
dependsOn:
  - name: rancher-project-entertainment
  - name: media-helm-repositories
  - name: media-storage
  - name: flaresolverr
