---
name: qbittorrent-helmop
defaultNamespace: fleet-local
labels:
  app.kubernetes.io/name: qbittorrent
  app.kubernetes.io/part-of: media-stack
  home-lab.io/project-slug: entertainment
  home-lab.io/lockfile-cleanup: enabled
imageScans:
  - image: registry.home/oci.trueforge.org/containerforge/qbittorrent
    tagName: qbittorrent
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=5.0.0 <6.0.0"
  - image: registry.home/docker.io/curlimages/curl
    tagName: qbittorrent-curl
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=8.0.0 <9.0.0"
  - image: registry.home/ghcr.io/abhi1693/qbittorrent-smart-queues
    tagName: qbittorrent-smart-queues
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=0.0.0 <1.0.0"
helm:
  takeOwnership: true
