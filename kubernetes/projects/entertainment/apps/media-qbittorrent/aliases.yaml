---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent-movies
  namespace: media
  labels:
    app.kubernetes.io/instance: qbittorrent-movies
    app.kubernetes.io/name: qbittorrent-alias
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  ingressClassName: traefik
  rules:
    - host: qbittorrent-movies.media.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent-movies
                port:
                  number: 8080
