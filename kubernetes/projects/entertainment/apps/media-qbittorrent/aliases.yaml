---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-movies
  namespace: media
  labels:
    app.kubernetes.io/instance: qbittorrent-movies
    app.kubernetes.io/name: qbittorrent-alias
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: qbittorrent
    app.kubernetes.io/name: qbittorrent
    pod.name: main
  ports:
    - name: main
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
