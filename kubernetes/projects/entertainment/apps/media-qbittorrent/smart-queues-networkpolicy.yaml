---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qbittorrent-smart-queues-network-boundary
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent-smart-queues
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: qbittorrent-smart-queues
      app.kubernetes.io/name: qbittorrent-smart-queues
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 192.168.3.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8081
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: home-assistant
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: home-assistant
              app.kubernetes.io/name: home-assistant
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8123
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: qbittorrent
              app.kubernetes.io/name: qbittorrent
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: sonarr
              app.kubernetes.io/name: sonarr
      ports:
        - protocol: TCP
          port: 8989
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: radarr
              app.kubernetes.io/name: radarr
      ports:
        - protocol: TCP
          port: 7878
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: jellyfin
              app.kubernetes.io/name: jellyfin
              home-lab.io/jellyfin-active: "true"
      ports:
        - protocol: TCP
          port: 8096
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rack-ops
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rpi-shutdown-controller
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbittorrent-smart-queues-media-services-egress
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent-smart-queues
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: qbittorrent-smart-queues
      app.kubernetes.io/name: qbittorrent-smart-queues
  egress:
    - toServices:
        - k8sService:
            serviceName: qbittorrent
            namespace: media
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toServices:
        - k8sService:
            serviceName: sonarr
            namespace: media
      toPorts:
        - ports:
            - port: "8989"
              protocol: TCP
    - toServices:
        - k8sService:
            serviceName: radarr
            namespace: media
      toPorts:
        - ports:
            - port: "7878"
              protocol: TCP
    - toServices:
        - k8sService:
            serviceName: jellyfin
            namespace: media
      toPorts:
        - ports:
            - port: "8096"
              protocol: TCP
