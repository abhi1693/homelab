---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-smart-queues
  namespace: media
  labels:
    app.kubernetes.io/instance: qbittorrent-smart-queues
    app.kubernetes.io/name: qbittorrent-smart-queues
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: qbittorrent-smart-queues
    app.kubernetes.io/name: qbittorrent-smart-queues
  ports:
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent-smart-queues-metrics
  namespace: media
  labels:
    app.kubernetes.io/instance: qbittorrent-smart-queues
    app.kubernetes.io/name: qbittorrent-smart-queues
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  ingressClassName: traefik
  rules:
    - host: qbittorrent.media.home
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: qbittorrent-smart-queues
                port:
                  number: 8081
  tls:
    - hosts:
        - qbittorrent.media.home
