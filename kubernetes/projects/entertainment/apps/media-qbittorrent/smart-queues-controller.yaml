            - name: QBT_RPI_COOLING_REQUIRE_ALL_TEMPERATURES
              value: "true"
            - name: QBT_RPI_COOLING_SHUTDOWN_TIMEOUT_SECONDS
              value: "300"
            - name: QBT_RPI_COOLING_COOLDOWN_SECONDS
              value: "1200"
            - name: QBT_RPI_COOLING_STATE_PATH
              value: /state/rpi-cooling.json
            - name: QBT_RPI_COOLING_SHUTDOWN_URL_TEMPLATE
              value: http://rpi-shutdown-{node}.rack-ops.svc.cluster.local:8000/shutdown
            - name: QBT_RPI_COOLING_CPU_QUERY
              value: >-
                max by (nodename) ( node_hwmon_temp_celsius{job="node-exporter", chip=~"thermal_thermal_zone.*"} * on(instance) group_left(nodename) max by (instance, nodename) (node_uname_info{job="node-exporter", machine="aarch64", nodename=~"k8s-rpi[123]"}) )
            - name: QBT_RPI_COOLING_NVME_QUERY
              value: >-
                max by (nodename) ( node_hwmon_temp_celsius{job="node-exporter", chip=~"nvme_.*"} * on(instance, chip, sensor) group_left(label) max by (instance, chip, sensor, label) (node_hwmon_sensor_label{job="node-exporter", chip=~"nvme_.*", label="Composite"}) * on(instance) group_left(nodename) max by (instance, nodename) (node_uname_info{job="node-exporter", machine="aarch64", nodename=~"k8s-rpi[123]"}) )
            - name: QBT_RATE_HEADROOM_FRACTION
