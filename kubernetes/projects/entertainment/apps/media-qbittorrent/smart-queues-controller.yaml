apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-smart-queues
  namespace: media
  labels:
    app.kubernetes.io/instance: qbittorrent-smart-queues
    app.kubernetes.io/name: qbittorrent-smart-queues
    app.kubernetes.io/part-of: media-stack
    home-lab.io/project-slug: entertainment
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: qbittorrent-smart-queues
      app.kubernetes.io/name: qbittorrent-smart-queues
      app.kubernetes.io/part-of: rack-ops
      home-lab.io/project-slug: home-automation
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: qbittorrent-smart-queues
        app.kubernetes.io/name: qbittorrent-smart-queues
        app.kubernetes.io/part-of: rack-ops
        home-lab.io/project-slug: home-automation
      annotations:
        home-lab.io/rpi-cooling-power-webhooks-revision: "2026-06-02"
    spec:
      serviceAccountName: qbittorrent-smart-queues
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: harbor-registry
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qbittorrent-smart-queues
          # renovate: datasource=docker depName=ghcr.io/abhi1693/qbittorrent-smart-queues
          image: registry.home/ghcr.io/abhi1693/qbittorrent-smart-queues:0.1.61
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: QBT_STOP_DOWNLOADS_ON_SHUTDOWN
              value: "true"
            - name: QBT_DECISION_SUMMARY_REPEAT_SECONDS
              value: "900"
            - name: QBT_GUARD_POLL_SECONDS
              value: "30"
            - name: QBT_GUARD_ERROR_POLL_SECONDS
              value: "60"
            - name: UDM_URL
              value: https://192.168.3.1
            - name: UDM_SITE
              value: default
            - name: UDM_API_BASE_PATH
              value: /proxy/network
            - name: UDM_VERIFY_TLS
              value: "false"
            - name: UDM_MONTHLY_DOWNLOAD_QUOTA_BYTES
              value: "2500000000000"
            - name: UDM_MONTHLY_DOWNLOAD_GUARDRAIL_BYTES
              value: "2500000000000"
            - name: UDM_MONTHLY_CAP_FRACTION
              value: "1.0"
            - name: UDM_STATS_INTERVAL
              value: split-daily-hourly
            - name: UDM_HISTORY_STATS_INTERVAL
              value: daily
            - name: UDM_CURRENT_STATS_INTERVAL
              value: hourly
            - name: UDM_DOWNLOAD_ATTRS
              value: |-
                wan-rx_bytes
                wan2-rx_bytes
            - name: UDM_INCLUDE_UPLOAD
              value: "false"
            - name: UDM_FAIL_CLOSED
              value: "false"
            - name: QBT_URLS
              value: |-
                http://qbittorrent.media.svc.cluster.local:8080
            - name: QBT_TIMEOUT
              value: "30"
            - name: QBT_REQUEST_ATTEMPTS
              value: "3"
            - name: QBT_REQUEST_RETRY_DELAY
              value: "2"
            - name: QBT_DELETE_FILES
              value: "true"
            - name: QBT_STALE_TORRENT_MAINTENANCE_ENABLED
              value: "true"
            - name: QBT_STALE_TORRENT_DAYS
              value: "14"
            - name: QBT_STALE_TORRENT_TAG_PREFIX
              value: stale-stalled
            - name: QBT_STALE_TORRENT_REANNOUNCE_ENABLED
              value: "true"
            - name: QBT_STALE_TORRENT_PARK_RUNNING_ENABLED
              value: "true"
            - name: QBT_STALE_TORRENT_REMOVE_IMPORTED_COMPLETED
              value: "true"
            - name: QBT_STALE_TORRENT_FAIL_PERMANENT_IMPORT_FAILURES
              value: "true"
            - name: QBT_DOWNLOAD_STORAGE_GUARD_ENABLED
              value: "true"
            - name: QBT_DOWNLOAD_STORAGE_PATH
              value: /downloads
            - name: QBT_DOWNLOAD_STORAGE_MIN_FREE_BYTES
              value: "32212254720"
            - name: QBT_DOWNLOAD_STORAGE_MIN_FREE_FRACTION
              value: "0.10"
            - name: QBT_DOWNLOAD_STORAGE_REQUIRE_TORRENT_FIT
