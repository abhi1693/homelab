            - name: QBT_RPI_COOLING_QBT_TOPOLOGY_FAIL_CLOSED
              value: "false"
            - name: QBT_RPI_COOLING_QBT_NAMESPACE
              value: media
            - name: QBT_RPI_COOLING_QBT_SELECTOR
              value: app.kubernetes.io/instance=qbittorrent,app.kubernetes.io/name=qbittorrent
            - name: QBT_RPI_COOLING_QBT_VOLUME_CLAIMS
              value: media-downloads
            - name: QBT_RPI_COOLING_CPU_THROTTLE_CELSIUS
              value: "76"
            - name: QBT_RPI_COOLING_NVME_THROTTLE_CELSIUS
              value: "70"
            - name: QBT_RPI_COOLING_CPU_PAUSE_CELSIUS
