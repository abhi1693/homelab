            - name: QBT_NVME_THERMAL_STOP_ENABLED
              value: "true"
            - name: QBT_NVME_THERMAL_STOP_CELSIUS
              value: "80"
            - name: QBT_NVME_THERMAL_FAIL_CLOSED
