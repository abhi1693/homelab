backups:
  enabled: true
  endpointURL: https://492e25f5f18ef59e38763f58a78362f7.r2.cloudflarestorage.com
  destinationPath: s3://home-lab-postgresql/
  provider: s3
  s3:
    region: auto
    bucket: home-lab-postgresql
    path: /
  secret:
    create: false
    name: postgresql-r2-backup-sops
  wal:
    compression: gzip
    encryption: ""
    maxParallel: 1
  data:
    compression: gzip
    encryption: ""
    jobs: 2
  scheduledBackups:
    - name: daily-backup
      schedule: "0 0 0 * * *"
      backupOwnerReference: self
      method: barmanObjectStore
  retentionPolicy: 30d
