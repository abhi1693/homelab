fullnameOverride: postgresql
type: postgresql
version:
  postgresql: "17"
mode: standalone
cluster:
  instances: 3
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: registry.home/ghcr.io/cloudnative-pg/postgresql:17.10
  imagePullSecrets:
    - name: harbor-registry
  annotations:
    home-lab.io/firefly-role-reconcile: "20260614T085757Z"
    home-lab.io/harbor-postgresql-secret: external
    home-lab.io/postgresql-pvc-resize: "20260630T071000Z"
    home-lab.io/zitadel-role-reconcile: "20260706T004400Z"
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised
  storage:
    storageClass: longhorn
    size: 2Gi
  walStorage:
    enabled: true
    storageClass: longhorn
    size: 4Gi
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      memory: 1Gi
  affinity:
    nodeSelector:
      kubernetes.io/arch: arm64
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  enablePDB: true
  enableSuperuserAccess: false
  services:
    disabledDefaultServices:
      - r
      - ro
  monitoring:
    enabled: true
    podMonitor:
      enabled: true
    instrumentation:
      logicalReplication: false
    customQueries:
      - name: pg_stat_statements_top
        target_databases:
          - postgres
        predicate_query: SELECT EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'pg_stat_statements')
        query: |
          SELECT
            d.datname,
            r.rolname,
            s.queryid::text AS queryid,
            left(regexp_replace(s.query, '\s+', ' ', 'g'), 180) AS query,
            row_number() OVER (ORDER BY s.total_exec_time DESC)::double precision AS total_rank,
            s.calls::double precision AS calls,
            (s.total_exec_time / 1000.0)::double precision AS total_exec_time_seconds,
            (s.mean_exec_time / 1000.0)::double precision AS mean_exec_time_seconds,
            (s.max_exec_time / 1000.0)::double precision AS max_exec_time_seconds,
            s.rows::double precision AS rows,
            s.shared_blks_read::double precision AS shared_blks_read,
            s.shared_blks_hit::double precision AS shared_blks_hit,
            s.shared_blks_dirtied::double precision AS shared_blks_dirtied,
            s.temp_blks_read::double precision AS temp_blks_read,
            s.temp_blks_written::double precision AS temp_blks_written,
            (s.shared_blk_read_time / 1000.0)::double precision AS shared_blk_read_time_seconds,
            (s.shared_blk_write_time / 1000.0)::double precision AS shared_blk_write_time_seconds
          FROM pg_stat_statements s
          JOIN pg_database d ON d.oid = s.dbid
          JOIN pg_roles r ON r.oid = s.userid
          WHERE d.datname NOT IN ('template0', 'template1')
          ORDER BY s.total_exec_time DESC
          LIMIT 25
        metrics:
          - datname:
              usage: LABEL
              description: Database name
          - rolname:
              usage: LABEL
              description: Role name
          - queryid:
              usage: LABEL
              description: pg_stat_statements query identifier
          - query:
              usage: LABEL
              description: Normalized query text truncated to 180 characters
          - total_rank:
              usage: GAUGE
              description: Rank by cumulative execution time
          - calls:
              usage: COUNTER
              description: Number of times the statement was executed
          - total_exec_time_seconds:
              usage: COUNTER
              description: Total time spent executing the statement
          - mean_exec_time_seconds:
              usage: GAUGE
              description: Mean execution time for the statement
          - max_exec_time_seconds:
              usage: GAUGE
              description: Maximum execution time for the statement
          - rows:
              usage: COUNTER
              description: Total rows retrieved or affected by the statement
          - shared_blks_read:
              usage: COUNTER
              description: Shared blocks read by the statement
          - shared_blks_hit:
              usage: COUNTER
              description: Shared block cache hits by the statement
          - shared_blks_dirtied:
              usage: COUNTER
              description: Shared blocks dirtied by the statement
          - temp_blks_read:
              usage: COUNTER
              description: Temporary blocks read by the statement
          - temp_blks_written:
              usage: COUNTER
              description: Temporary blocks written by the statement
          - shared_blk_read_time_seconds:
              usage: COUNTER
              description: Time spent reading shared data file blocks by the statement
          - shared_blk_write_time_seconds:
              usage: COUNTER
              description: Time spent writing shared data file blocks by the statement
  postgresql:
    parameters:
      max_connections: "200"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"
      shared_buffers: "256MB"
      track_io_timing: "on"
      wal_level: "replica"
    synchronous:
      method: any
      number: 1
      dataDurability: required
      failoverQuorum: true
  roles:
    - name: coder
      ensure: absent
    - name: netbox
      ensure: present
      login: true
      connectionLimit: 10
      superuser: false
      createdb: false
      createrole: false
