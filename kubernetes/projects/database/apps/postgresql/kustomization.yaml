---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: postgresql-values
    files:
      - values.yaml
generatorOptions:
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: postgresql
configurations:
  - kustomizeconfig.yaml
resources:
  - namespace.yaml
  - secrets.sops.yaml
  - registry-secrets.sops.yaml
  - db-performance-grafana-dashboard.yaml
  - grafana-dashboard.yaml
  - helmop.yaml
  - prometheusrule.yaml
  - serviceaccount.yaml
