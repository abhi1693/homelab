---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-webhook-ca-repair
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: cnpg-webhook-ca-repair
    app.kubernetes.io/part-of: cnpg-operator
    home-lab.io/project-slug: database
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-webhook-ca-repair
  labels:
    app.kubernetes.io/name: cnpg-webhook-ca-repair
    app.kubernetes.io/part-of: cnpg-operator
    home-lab.io/project-slug: database
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-webhook-ca-repair
  labels:
    app.kubernetes.io/name: cnpg-webhook-ca-repair
    app.kubernetes.io/part-of: cnpg-operator
    home-lab.io/project-slug: database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnpg-webhook-ca-repair
subjects:
  - kind: ServiceAccount
    name: cnpg-webhook-ca-repair
    namespace: {{ .Release.Namespace | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-webhook-ca-repair
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: cnpg-webhook-ca-repair
    app.kubernetes.io/part-of: cnpg-operator
    home-lab.io/project-slug: database
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cnpg-webhook-ca-repair
        app.kubernetes.io/part-of: cnpg-operator
        home-lab.io/project-slug: database
    spec:
      serviceAccountName: cnpg-webhook-ca-repair
      automountServiceAccountToken: true
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: kubectl
          image: rancher/kuberlr-kubectl:v7.0.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              ca_bundle="$(kubectl -n {{ .Release.Namespace | quote }} get secret cnpg-webhook-cert -o jsonpath='{.data.tls\.crt}')"
              if [ -z "$ca_bundle" ]; then
                echo "cnpg-webhook-cert does not contain tls.crt"
                exit 1
              fi

              for target in \
                mutatingwebhookconfigurations.admissionregistration.k8s.io/cnpg-mutating-webhook-configuration \
                validatingwebhookconfigurations.admissionregistration.k8s.io/cnpg-validating-webhook-configuration
              do
                webhook_count="$(kubectl get "$target" -o jsonpath='{.webhooks[*].name}' | wc -w | tr -d '[:space:]')"
                i=0
                while [ "$i" -lt "$webhook_count" ]; do
                  kubectl patch "$target" --type=json \
                    -p="[{\"op\":\"add\",\"path\":\"/webhooks/$i/clientConfig/caBundle\",\"value\":\"$ca_bundle\"}]"
                  i=$((i + 1))
                done
              done
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
