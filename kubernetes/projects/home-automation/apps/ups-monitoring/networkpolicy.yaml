---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ups-monitoring-network-boundary
  namespace: ups
  labels:
    app.kubernetes.io/name: ups-monitoring
    app.kubernetes.io/part-of: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ups-monitoring
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: home-assistant
      ports:
        - protocol: TCP
          port: 3493
    - from:
        - ipBlock:
            cidr: 192.168.3.0/24
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3493
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9199
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
