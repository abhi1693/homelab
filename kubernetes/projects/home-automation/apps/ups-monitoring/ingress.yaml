---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ups-monitoring
  namespace: ups
  labels:
    app.kubernetes.io/name: ups-monitoring
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: home-automation
spec:
  ingressClassName: traefik
  rules:
    - host: ups.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ups-monitoring
                port:
                  name: http
