---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rack-ops-network-boundary
  namespace: rack-ops
  labels:
    app.kubernetes.io/name: rack-ops
    app.kubernetes.io/part-of: rack-ops
    home-lab.io/project-slug: home-automation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rack-ops
      app.kubernetes.io/part-of: rack-ops
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8081
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: home-assistant
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: home-assistant
              app.kubernetes.io/name: home-assistant
      ports:
        - protocol: TCP
          port: 8123
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rack-ops-apiserver-access
  namespace: rack-ops
  labels:
    app.kubernetes.io/name: rack-ops
    app.kubernetes.io/part-of: rack-ops
    home-lab.io/project-slug: home-automation
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rack-ops
      app.kubernetes.io/part-of: rack-ops
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
