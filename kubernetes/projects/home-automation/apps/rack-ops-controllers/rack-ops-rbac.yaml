---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rack-ops
  namespace: rack-ops
  labels:
    app.kubernetes.io/name: rack-ops
    app.kubernetes.io/part-of: rack-ops
    home-lab.io/project-slug: home-automation
---
apiVersion: rbac.authorization.k8s.io/v1
