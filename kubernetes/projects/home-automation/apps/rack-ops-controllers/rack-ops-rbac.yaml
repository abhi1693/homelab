      - fleet.cattle.io
    resources:
      - bundles
    resourceNames:
      - flaresolverr-helmop
      - git-rank
      - indexly
      - jellyfin
      - media-dispatcharr
      - media-do-squid-firewall
      - media-metube
      - media-profilarr
      - media-ryokan
      - media-shoko
      - personal-blog
      - portfolio
      - prowlarr-helmop
      - qbittorrent-helmop
      - radarr-helmop
      - shipyardhq
      - sonarr-helmop
    verbs:
      - get
      - patch
