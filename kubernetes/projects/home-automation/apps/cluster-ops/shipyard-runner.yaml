---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-recommendation-engine-shipyard
  namespace: cluster-ops
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
    app.kubernetes.io/instance: shipyard
    app.kubernetes.io/part-of: cluster-ops
    home-lab.io/project-slug: home-automation
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-recommendation-engine
      app.kubernetes.io/instance: shipyard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-recommendation-engine
        app.kubernetes.io/instance: shipyard
        app.kubernetes.io/part-of: cluster-ops
        home-lab.io/project-slug: home-automation
    spec:
      serviceAccountName: k8s-recommendation-engine
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: harbor-registry
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clone-home-lab
          # renovate: datasource=docker depName=ghcr.io/abhi1693/k8s-recommendation-engine
          image: registry.home/ghcr.io/abhi1693/k8s-recommendation-engine:0.0.15
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mkdir -p "$HOME"
              umask 077
              git config --global credential.helper store
              printf 'https://%s:%s@github.com\n' "$GIT_USERNAME" "$GIT_PASSWORD" > "$HOME/.git-credentials"
              rm -rf /git/home-lab
              git clone --depth=1 --branch "$GIT_BRANCH" "$GIT_REPO_URL" /git/home-lab
              cd /git/home-lab
              git config user.name "$GIT_AUTHOR_NAME"
              git config user.email "$GIT_AUTHOR_EMAIL"
          env:
            - name: HOME
              value: /home/nonroot
            - name: GIT_REPO_URL
              value: https://github.com/abhi1693/home-lab.git
            - name: GIT_BRANCH
              value: master
            - name: GIT_AUTHOR_NAME
              value: k8s-recommendation-engine
            - name: GIT_AUTHOR_EMAIL
              value: k8s-recommendation-engine@home-lab.local
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: username
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: git-home
              mountPath: /home/nonroot
            - name: git-worktree
              mountPath: /git
            - name: tmp
              mountPath: /tmp
      containers:
        - name: controller
          # renovate: datasource=docker depName=ghcr.io/abhi1693/k8s-recommendation-engine
          image: registry.home/ghcr.io/abhi1693/k8s-recommendation-engine:0.0.15
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mkdir -p "$HOME"
              umask 077
              git config --global credential.helper store
              printf 'https://%s:%s@github.com\n' "$GIT_USERNAME" "$GIT_PASSWORD" > "$HOME/.git-credentials"
              cd /git/home-lab
              git config user.name "$GIT_AUTHOR_NAME"
              git config user.email "$GIT_AUTHOR_EMAIL"
              exec /usr/local/bin/k8s-recommendation-engine run \
                --config /etc/k8s-recommendation-engine/profile.yaml \
                --prometheus-url "$PROMETHEUS_URL" \
                --history-window "$HISTORY_WINDOW" \
                --history-step "$HISTORY_STEP" \
                --timeout "$RECONCILE_TIMEOUT" \
                --state-db /var/lib/k8s-recommendation-engine/shipyard.db \
                --interval "$RECONCILE_INTERVAL" \
                --git-worktree /git/home-lab \
                --mode propose \
                --proposal-kind commit \
                --proposal-branch "$GIT_BRANCH" \
                --proposal-push \
                --allow-default-branch-push \
                --output summary
          env:
            - name: HOME
              value: /home/nonroot
            - name: PROMETHEUS_URL
              value: http://rancher-monitoring-prometheus.cattle-monitoring-system.svc.cluster.local:9090
            - name: HISTORY_WINDOW
              value: 6h
            - name: HISTORY_STEP
              value: 5m
            - name: RECONCILE_INTERVAL
              value: 5m
            - name: RECONCILE_TIMEOUT
              value: 2m
            - name: GIT_BRANCH
              value: master
            - name: GIT_AUTHOR_NAME
              value: k8s-recommendation-engine
            - name: GIT_AUTHOR_EMAIL
              value: k8s-recommendation-engine@home-lab.local
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: username
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: profile
              mountPath: /etc/k8s-recommendation-engine
              readOnly: true
            - name: git-home
              mountPath: /home/nonroot
            - name: git-worktree
              mountPath: /git
            - name: state
              mountPath: /var/lib/k8s-recommendation-engine
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: profile
          configMap:
            name: k8s-recommendation-engine-profile-shipyard
            items:
              - key: profile.yaml
                path: profile.yaml
        - name: state
          persistentVolumeClaim:
            claimName: k8s-recommendation-engine-shipyard-state
        - name: git-home
          emptyDir: {}
        - name: git-worktree
          emptyDir: {}
        - name: tmp
          emptyDir: {}
