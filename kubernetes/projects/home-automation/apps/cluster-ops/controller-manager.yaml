---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-recommendation-engine-controller-manager
  namespace: cluster-ops
  labels:
    app.kubernetes.io/name: k8s-recommendation-engine
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: cluster-ops
    home-lab.io/project-slug: home-automation
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-recommendation-engine
      app.kubernetes.io/component: controller
  template:
    metadata:
      annotations:
        # Force the init container to clone Git sources containing Helm mappings.
        home-lab.io/git-clone-generation: "2026-07-13-helm-profiles-1"
      labels:
        app.kubernetes.io/name: k8s-recommendation-engine
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: cluster-ops
        home-lab.io/project-slug: home-automation
    spec:
      serviceAccountName: k8s-recommendation-engine
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: harbor-registry
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: clone-home-lab
          # renovate: datasource=docker depName=ghcr.io/abhi1693/k8s-recommendation-engine
          image: registry.home/ghcr.io/abhi1693/k8s-recommendation-engine:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mkdir -p "$HOME"
              umask 077
              git config --global credential.helper store
              printf 'https://%s:%s@github.com\n' "$GIT_USERNAME" "$GIT_PASSWORD" > "$HOME/.git-credentials"
              rm -rf /git/home-lab
              git clone --depth=1 --branch "$GIT_BRANCH" "$GIT_REPO_URL" /git/home-lab
              cd /git/home-lab
              git config user.name "$GIT_AUTHOR_NAME"
              git config user.email "$GIT_AUTHOR_EMAIL"
          env:
            - name: HOME
              value: /home/nonroot
            - name: GIT_REPO_URL
              value: https://github.com/abhi1693/home-lab.git
            - name: GIT_BRANCH
              value: master
            - name: GIT_AUTHOR_NAME
              value: k8s-recommendation-engine
            - name: GIT_AUTHOR_EMAIL
              value: k8s-recommendation-engine@home-lab.local
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: username
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: git-home
              mountPath: /home/nonroot
            - name: git-worktree
              mountPath: /git
            - name: tmp
              mountPath: /tmp
      containers:
        - name: manager
          # renovate: datasource=docker depName=ghcr.io/abhi1693/k8s-recommendation-engine
          image: registry.home/ghcr.io/abhi1693/k8s-recommendation-engine:0.2.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mkdir -p "$HOME"
              umask 077
              git config --global credential.helper store
              printf 'https://%s:%s@github.com\n' "$GIT_USERNAME" "$GIT_PASSWORD" > "$HOME/.git-credentials"
              cd /git/home-lab
              git config user.name "$GIT_AUTHOR_NAME"
              git config user.email "$GIT_AUTHOR_EMAIL"
              # Keep the legacy filename until the shared state is migrated offline.
              exec /usr/local/bin/k8s-recommendation-engine controller \
                --watch-namespace "$POD_NAMESPACE" \
                --prometheus-url "$PROMETHEUS_URL" \
                --history-window "$HISTORY_WINDOW" \
                --history-step "$HISTORY_STEP" \
                --reconcile-interval "$RECONCILE_INTERVAL" \
                --reconcile-timeout "$RECONCILE_TIMEOUT" \
                --state-db /var/lib/k8s-recommendation-engine/shipyard.db \
                --git-worktree /git/home-lab \
                --mode propose \
                --proposal-kind commit \
                --proposal-branch "$GIT_BRANCH" \
                --proposal-push \
                --allow-default-branch-push \
                --availability-recovery \
                --max-concurrent-reconciles 1 \
                --leader-elect \
                --metrics-bind-address :8080 \
                --health-probe-bind-address :8081
          env:
            - name: HOME
              value: /home/nonroot
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PROMETHEUS_URL
              value: http://rancher-monitoring-prometheus.cattle-monitoring-system.svc.cluster.local:9090
            - name: HISTORY_WINDOW
              value: 6h
            - name: HISTORY_STEP
              value: 5m
            - name: RECONCILE_INTERVAL
              value: 1m
            - name: RECONCILE_TIMEOUT
              value: 2m
            - name: GIT_BRANCH
              value: master
            - name: GIT_AUTHOR_NAME
              value: k8s-recommendation-engine
            - name: GIT_AUTHOR_EMAIL
              value: k8s-recommendation-engine@home-lab.local
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: username
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-lab-apps-github
                  key: password
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: git-home
              mountPath: /home/nonroot
            - name: git-worktree
              mountPath: /git
            - name: state
              mountPath: /var/lib/k8s-recommendation-engine
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: state
          persistentVolumeClaim:
            # Keep the legacy bound claim name to preserve recommendation history.
            claimName: k8s-recommendation-engine-shipyard-state
        - name: git-home
          emptyDir: {}
        - name: git-worktree
          emptyDir: {}
        - name: tmp
          emptyDir: {}
