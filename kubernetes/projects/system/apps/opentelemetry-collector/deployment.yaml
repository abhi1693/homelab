---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentelemetry-collector
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/component: telemetry-pipeline
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/component: telemetry-pipeline
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/component: telemetry-pipeline
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        home-lab.io/collector-config-revision: "2026-06-21-traces"
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/component: telemetry-pipeline
        app.kubernetes.io/part-of: rancher-monitoring
        home-lab.io/project-slug: system
    spec:
      serviceAccountName: opentelemetry-collector
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: collector
          image: docker.io/otel/opentelemetry-collector-contrib:0.155.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 112Mi
            limits:
              memory: 176Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: opentelemetry-collector
