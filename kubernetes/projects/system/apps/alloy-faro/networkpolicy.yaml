---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alloy-faro-boundary
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: alloy-faro
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: alloy-faro
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflare
          podSelector:
            matchLabels:
              app: controlled-cloudflared-connector
              strrl.dev/cloudflare-tunnel-ingress-controller: controlled-cloudflared-connector
      ports:
        - protocol: TCP
          port: 12347
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cattle-monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 12345
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
              app.kubernetes.io/instance: loki
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tempo
              app.kubernetes.io/component: tracing-backend
      ports:
        - protocol: TCP
          port: 4318
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: portfolio
          podSelector:
            matchLabels:
              app.kubernetes.io/name: portfolio
              app.kubernetes.io/component: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: personal-blog
          podSelector:
            matchLabels:
              app.kubernetes.io/name: personal-blog
              app.kubernetes.io/component: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: indexly
          podSelector:
            matchLabels:
              app.kubernetes.io/name: indexly
              app.kubernetes.io/component: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipyardhq
          podSelector:
            matchLabels:
              app.kubernetes.io/name: shipyardhq
              app.kubernetes.io/component: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wardn
          podSelector:
            matchLabels:
              app.kubernetes.io/name: wardn-hub-frontend
              app.kubernetes.io/component: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: git-rank
          podSelector:
            matchLabels:
              app.kubernetes.io/name: git-rank-frontend
              app.kubernetes.io/component: frontend
      ports:
        - protocol: TCP
          port: 3000
