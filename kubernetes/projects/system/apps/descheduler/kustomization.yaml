---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fleet-local
resources:
  - helmop.yaml
configMapGenerator:
  - name: descheduler-values
    files:
      - values.yaml
generatorOptions:
  labels:
    app.kubernetes.io/name: descheduler
    app.kubernetes.io/part-of: descheduler
    home-lab.io/project-slug: system
configurations:
  - kustomizeconfig.yaml
