---
crds:
  create: false

controller:
  type: deployment
  replicas: 1
  nodeSelector:
    kubernetes.io/arch: arm64

alloy:
  enableReporting: false
  configMap:
    content: |-
      discovery.kubernetes "pods" {
        role = "pod"

        selectors {
          role  = "pod"
          field = "status.phase=Running"
        }
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "(kube-system|kube-public|kube-node-lease|cattle-system|cattle-fleet-system|cattle-impersonation-system|cattle-provisioning-capi-system|cattle-resources-system|fleet-local|cert-manager|longhorn-system)"
          action        = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex         = "(.+)"
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_part_of"]
          regex         = "(.+)"
          target_label  = "part_of"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
          regex         = "(.+)"
          target_label  = "component"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "job"
        }

        rule {
          target_label = "cluster"
          replacement  = "local"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.local.receiver]
      }

      loki.write "local" {
        endpoint {
          url = "http://loki-gateway.cattle-monitoring-system.svc.cluster.local/loki/api/v1/push"
        }
      }
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

configReloader:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

serviceMonitor:
  enabled: true
  additionalLabels:
    app.kubernetes.io/part-of: rancher-monitoring

