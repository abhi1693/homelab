---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing-backend
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing-backend
  ports:
    - name: http
      port: 3200
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9095
      targetPort: grpc
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
