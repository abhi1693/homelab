---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tempo-boundary
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing-backend
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/component: tracing-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
              app.kubernetes.io/component: telemetry-pipeline
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
              app.kubernetes.io/instance: alloy-faro
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 3200
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 3200
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: rancher-monitoring-prometheus
      ports:
        - protocol: TCP
          port: 3200
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
