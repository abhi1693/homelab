---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: cattle-monitoring-system
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing-backend
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
      app.kubernetes.io/component: tracing-backend
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        home-lab.io/tempo-config-revision: "2026-06-22-enable-mcp-server"
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/component: tracing-backend
        app.kubernetes.io/part-of: rancher-monitoring
        home-lab.io/project-slug: system
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: tempo
          image: docker.io/grafana/tempo:2.9.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yaml
          env:
            - name: GOMEMLIMIT
              value: 768MiB
            - name: GOGC
              value: "50"
          ports:
            - name: http
              containerPort: 3200
              protocol: TCP
            - name: grpc
              containerPort: 9095
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 80m
              memory: 768Mi
            limits:
              memory: 1280Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo
        - name: data
          emptyDir:
            sizeLimit: 2Gi
