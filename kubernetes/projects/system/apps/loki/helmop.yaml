---
apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: loki
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
spec:
  defaultNamespace: cattle-monitoring-system
  dependsOn:
    - name: system-helm-repositories
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: rancher-monitoring
    home-lab.io/project-slug: system
  targets:
    - name: default
      clusterGroup: default
  targetRestrictions:
    - name: default
      clusterGroup: default
  correctDrift:
    enabled: true
    force: true
    keepFailHistory: true
  downstreamResources:
    - kind: ConfigMap
      name: loki-values
  helm:
    releaseName: loki
    repo: https://grafana.github.io/helm-charts
    chart: loki
    version: 7.0.0
    timeoutSeconds: 900
    takeOwnership: true
    valuesFrom:
      - configMapKeyRef:
          name: loki-values
          namespace: fleet-local
          key: values.yaml
    waitForJobs: true
