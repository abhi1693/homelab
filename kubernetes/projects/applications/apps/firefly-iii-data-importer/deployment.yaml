---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-iii-data-importer
  namespace: finance
  labels:
    app.kubernetes.io/name: firefly-iii-data-importer
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: firefly-iii
    home-lab.io/project-slug: applications
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: firefly-iii-data-importer
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefly-iii-data-importer
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: firefly-iii
        home-lab.io/project-slug: applications
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 33
        runAsNonRoot: true
        runAsUser: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: data-importer
          image: registry.home/docker.io/fireflyiii/data-importer:version-2.3.3
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: firefly-iii-data-importer
          env:
            - name: AUTO_IMPORT_SECRET
              valueFrom:
                secretKeyRef:
                  name: firefly-iii-data-importer
                  key: AUTO_IMPORT_SECRET
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              memory: 112Mi
          startupProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: configurations
              mountPath: /var/www/html/storage/configurations
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: configurations
          persistentVolumeClaim:
            claimName: firefly-iii-data-importer-config
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
