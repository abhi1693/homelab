apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipyardhq-imgproxy
  namespace: shipyardhq
  labels:
    app.kubernetes.io/name: shipyardhq-imgproxy
    app.kubernetes.io/component: image-proxy
    app.kubernetes.io/part-of: shipyardhq
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shipyardhq-imgproxy
      app.kubernetes.io/component: image-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shipyardhq-imgproxy
        app.kubernetes.io/component: image-proxy
        app.kubernetes.io/part-of: shipyardhq
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      priorityClassName: shipyardhq-critical
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: shipyardhq-imgproxy
                    app.kubernetes.io/component: image-proxy
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shipyardhq-imgproxy
              app.kubernetes.io/component: image-proxy
      containers:
        - name: imgproxy
          # renovate: datasource=docker depName=ghcr.io/imgproxy/imgproxy
          image: registry.home/ghcr.io/imgproxy/imgproxy:v4.0.11
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: shipyardhq-imgproxy
            - secretRef:
                name: shipyardhq-imgproxy
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 192Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
