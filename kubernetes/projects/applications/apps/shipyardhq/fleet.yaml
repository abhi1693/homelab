---
name: shipyardhq
defaultNamespace: shipyardhq
labels:
  app.kubernetes.io/part-of: shipyardhq
  home-lab.io/project-slug: applications
rolloutStrategy:
  maxUnavailable: 2
  maxUnavailablePartitions: 2
imageScans:
  - image: registry.home/ghcr.io/abhi1693/shipyardhq
    tagName: shipyardhq
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=1.0.0 <2.0.0"
  - image: registry.home/ghcr.io/imgproxy/imgproxy
    tagName: shipyardhq-imgproxy
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=4.0.0 <5.0.0"
dependsOn:
  - name: rancher-project-applications
  - name: postgresql
  - name: postgresql-networkpolicy
  - name: postgresql-pooler-pdb
  - name: valkey
  - name: valkey-networkpolicy
helm:
  takeOwnership: true
  timeoutSeconds: 5400
  waitForJobs: true
forceSyncGeneration: 1
