apiVersion: batch/v1
kind: CronJob
metadata:
  name: shipyardhq-images-ingest-external
  namespace: shipyardhq
  labels:
    app.kubernetes.io/name: shipyardhq
    app.kubernetes.io/component: cron
    app.kubernetes.io/part-of: shipyardhq
spec:
  schedule: "0 */3 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: shipyardhq
            app.kubernetes.io/component: cron
            app.kubernetes.io/part-of: shipyardhq
            shipyardhq-psql-client: "true"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: harbor-registry
          nodeSelector:
            kubernetes.io/arch: arm64
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingest-external-images
              # renovate: datasource=docker depName=ghcr.io/abhi1693/shipyardhq
              image: registry.home/ghcr.io/abhi1693/shipyardhq:1.4.98
              imagePullPolicy: IfNotPresent
              command:
                - npm
                - run
                - images:ingest-external:apply
              envFrom:
                - secretRef:
                    name: shipyardhq
                - secretRef:
                    name: shipyardhq-imgproxy
                - configMapRef:
                    name: shipyardhq
              env:
                - name: NODE_OPTIONS
                  value: --max-old-space-size=1024
                - name: NPM_CONFIG_CACHE
                  value: /tmp/.npm
                - name: PG_APPLICATION_NAME
                  value: shipyardhq-images-ingest-external
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: shipyardhq-postgresql
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: shipyardhq-postgresql
                      key: password
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: shipyardhq-postgresql
                      key: dbname
                - name: DATABASE_URL
                  value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
                - name: DIRECT_DATABASE_URL
                  value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1536Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1001
                runAsNonRoot: true
                runAsUser: 1001
