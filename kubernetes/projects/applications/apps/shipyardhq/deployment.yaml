apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipyardhq
  namespace: shipyardhq
  labels:
    app.kubernetes.io/name: shipyardhq
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: shipyardhq
spec:
  replicas: 3
  progressDeadlineSeconds: 4200
  selector:
    matchLabels:
      app.kubernetes.io/name: shipyardhq
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        home-lab.io/faro-config-revision: "2026-07-01-faro-key-rebuild"
      labels:
        app.kubernetes.io/name: shipyardhq
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: shipyardhq
        shipyardhq-psql-client: "true"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      priorityClassName: shipyardhq-critical
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: shipyardhq
                    app.kubernetes.io/component: web
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shipyardhq
              app.kubernetes.io/component: web
      initContainers:
        - name: restore-next-build
          # renovate: datasource=docker depName=ghcr.io/abhi1693/shipyardhq
          image: registry.home/ghcr.io/abhi1693/shipyardhq:1.4.98
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              cache_version=next-build-v10
              cache_root=/app/.next-build-cache
              artifact_root="$cache_root/artifacts"
              build_root=/app/.next

              mkdir -p "$artifact_root" "$build_root"

              configure_next_build() {
                for env_name in NEXT_STATIC_PAGE_GENERATION_TIMEOUT NEXT_STATIC_GENERATION_MAX_CONCURRENCY NEXT_STATIC_GENERATION_RETRY_COUNT; do
                  eval "env_value=\${$env_name:-}"
                  case "$env_value" in
                    ''|*[!0-9]*)
                      echo "$env_name must be set to whole seconds/counts."
                      exit 1
                      ;;
                  esac
                done

                node <<'NODE'
              const fs = require("fs")

              function readIntEnv(name, minimum) {
                const value = Number.parseInt(process.env[name] || "", 10)
                if (!Number.isSafeInteger(value) || value < minimum) {
                  throw new Error(`${name} must be at least ${minimum}`)
                }
                return value
              }

              const configPath = "next.config.ts"
              const timeout = readIntEnv("NEXT_STATIC_PAGE_GENERATION_TIMEOUT", 60)
              const maxConcurrency = readIntEnv("NEXT_STATIC_GENERATION_MAX_CONCURRENCY", 1)
              const retryCount = readIntEnv("NEXT_STATIC_GENERATION_RETRY_COUNT", 0)

              let config = fs.readFileSync(configPath, "utf8")
              const anchor = "const nextConfig: NextConfig = {\n"
              if (!config.includes(anchor)) {
                throw new Error("Unable to find nextConfig object in next.config.ts")
              }

              const setting = `  staticPageGenerationTimeout: ${timeout},`
              if (/^\s*staticPageGenerationTimeout\s*:/m.test(config)) {
                config = config.replace(/^\s*staticPageGenerationTimeout\s*:.*$/m, setting)
              } else {
                config = config.replace(anchor, `${anchor}${setting}\n`)
              }

              const experimentalSettings = [
                `    staticGenerationRetryCount: ${retryCount},`,
                `    staticGenerationMaxConcurrency: ${maxConcurrency},`,
              ]
              const experimentalMatch = config.match(/^  experimental: \{\n([\s\S]*?)^  \},/m)
              if (experimentalMatch) {
                let body = experimentalMatch[1]
                for (const line of experimentalSettings) {
                  const name = line.trim().split(":")[0]
                  const linePattern = new RegExp(`^\\s*${name}\\s*:.*$`, "m")
                  body = linePattern.test(body) ? body.replace(linePattern, line) : `${body}${line}\n`
                }
                config = config.replace(experimentalMatch[0], `  experimental: {\n${body}  },`)
              } else {
                config = config.replace(anchor, `${anchor}  experimental: {\n${experimentalSettings.join("\n")}\n  },\n`)
              }

              fs.writeFileSync(configPath, config)
              console.log(`Configured Next.js static generation: timeout=${timeout}s maxConcurrency=${maxConcurrency} retryCount=${retryCount}.`)
              NODE
              }

              configure_next_build

              source_key="$(
                {
                  for path in actions app components hooks lib prisma public scripts types; do
                    [ -d "$path" ] && find "$path" -type f -print0
                  done
                  for path in imageLoader.ts next.config.ts package.json package-lock.json postcss.config.mjs proxy.ts tailwind.config.js tsconfig.json; do
                    [ -f "$path" ] && printf '%s\0' "$path"
                  done
                } | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}'
              )"
              env_key="$(
                env | LC_ALL=C sort \
                  | grep -E '^(CACHE_ENV_PREFIX|CLERK_|DODO_|GA_|GOOGLE_|IMGPROXY_|LINKEDIN_|MONTHLY_WINNER_|NEXT_PUBLIC_|NEXT_STATIC_GENERATION_MAX_CONCURRENCY|NEXT_STATIC_GENERATION_RETRY_COUNT|NEXT_STATIC_PAGE_GENERATION_TIMEOUT|NOVU_|POSTGRES_DB|PRODUCT_HUNT_|PRODUCT_PRERENDER_LIMIT|R2_|REDDIT_|RESEND_|TWITTER_|USE_CASE_PRERENDER_LIMIT)=' \
                  | sha256sum | awk '{print $1}'
              )"
              build_key="$(printf '%s\n%s\n%s\n' "$cache_version" "$source_key" "$env_key" | sha256sum | awk '{print $1}')"
              artifact="$artifact_root/$build_key.tar.gz"
              ready="$artifact_root/$build_key.ready"

              clear_build_root() {
                rm -rf "$build_root"/* "$build_root"/.[!.]* "$build_root"/..?* 2>/dev/null || true
                mkdir -p "$build_root"
              }

              restore_artifact() {
                if [ -f "$ready" ] && [ -s "$artifact" ]; then
                  echo "Restoring cached Next.js build artifact $build_key..."
                  clear_build_root
                  if tar --extract --gzip --file "$artifact" --directory "$build_root" --no-same-owner --no-same-permissions --delay-directory-restore --touch; then
                    return 0
                  fi

                  echo "Cached Next.js build artifact $build_key could not be restored; rebuilding it."
                  clear_build_root
                else
                  echo "Cached Next.js build artifact $build_key is missing."
                fi

                return 1
              }

              if restore_artifact; then
                exit 0
              fi

              lock_dir="$artifact.lock"
              attempt=0
              max_attempts=540
              while ! mkdir "$lock_dir" 2>/dev/null; do
                if restore_artifact; then
                  exit 0
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "Timed out waiting for another pod to build Next.js artifact $build_key."
                  exit 1
                fi

                echo "Waiting for another pod to build Next.js artifact $build_key..."
                attempt=$((attempt + 1))
                sleep 10
              done

              cleanup_lock() {
                rmdir "$lock_dir" 2>/dev/null || true
              }
              trap cleanup_lock EXIT INT TERM

              if restore_artifact; then
                exit 0
              fi

              echo "Building missing Next.js artifact $build_key from this pod image..."
              npm run prisma:deploy

              clear_build_root
              npm run prisma:generate
              npm run build
              rm -rf .next/standalone/public .next/standalone/.next/static
              mkdir -p .next/standalone/.next
              cp -R public .next/standalone/public
              cp -R .next/static .next/standalone/.next/static

              tmp_artifact="$artifact.tmp.$$"
              rm -f "$tmp_artifact"
              (
                cd "$build_root"
                find . -mindepth 1 -maxdepth 1 -print0 | tar --null --create --gzip --file "$tmp_artifact" --files-from -
              )
              mv "$tmp_artifact" "$artifact"
              touch "$ready"
              echo "Next.js build artifact $build_key is ready."
          envFrom:
            - secretRef:
                name: shipyardhq
            - secretRef:
                name: shipyardhq-imgproxy
            - configMapRef:
                name: shipyardhq
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=4096
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
            - name: PG_APPLICATION_NAME
              value: shipyardhq-next-build
            - name: NEXT_STATIC_PAGE_GENERATION_TIMEOUT
              value: "300"
            - name: NEXT_STATIC_GENERATION_MAX_CONCURRENCY
              value: "2"
            - name: NEXT_STATIC_GENERATION_RETRY_COUNT
              value: "3"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: dbname
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
            - name: DIRECT_DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
          resources:
            requests:
              cpu: 500m
              ephemeral-storage: 4Gi
              memory: 2Gi
            limits:
              cpu: "3"
              ephemeral-storage: 8Gi
              memory: 5Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          volumeMounts:
            - name: next-build
              mountPath: /app/.next
            - name: next-build-cache
              mountPath: /app/.next-build-cache
      containers:
        - name: web
          # renovate: datasource=docker depName=ghcr.io/abhi1693/shipyardhq
          image: registry.home/ghcr.io/abhi1693/shipyardhq:1.4.98
          imagePullPolicy: IfNotPresent
          command:
            - node
            - .next/standalone/server.js
          envFrom:
            - secretRef:
                name: shipyardhq
            - secretRef:
                name: shipyardhq-imgproxy
            - configMapRef:
                name: shipyardhq
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: PG_APPLICATION_NAME
              value: shipyardhq-web
            - name: OTEL_SERVICE_NAME
              value: shipyardhq
            - name: OTEL_TRACES_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: http/protobuf
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/metrics
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: "512"
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: "128"
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: "10000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=shipyard,deployment.environment.name=production,service.instance.id=$(POD_NAME),k8s.namespace.name=shipyardhq,k8s.deployment.name=shipyardhq,k8s.pod.name=$(POD_NAME),k8s.container.name=web
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.cattle-monitoring-system.svc.cluster.local:4040
            - name: PYROSCOPE_APPLICATION_NAME
              value: shipyardhq
            - name: PYROSCOPE_TAG_PROCESS_ROLE
              value: web
            - name: PYROSCOPE_FLUSH_INTERVAL_MS
              value: "60000"
            - name: PYROSCOPE_WALL_SAMPLING_INTERVAL_MICROS
              value: "10000"
            - name: PYROSCOPE_WALL_COLLECT_CPU_TIME
              value: "false"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: dbname
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
            - name: DIRECT_DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              ephemeral-storage: 2Gi
              memory: 1280Mi
            limits:
              ephemeral-storage: 6Gi
              memory: 5Gi
          startupProbe:
            httpGet:
              path: /robots.txt
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /robots.txt
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /robots.txt
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          volumeMounts:
            - name: next-build
              mountPath: /app/.next
      volumes:
        - name: next-build
          emptyDir:
            sizeLimit: 6Gi
        - name: next-build-cache
          persistentVolumeClaim:
            claimName: shipyardhq-next-build-cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipyardhq-worker
  namespace: shipyardhq
  labels:
    app.kubernetes.io/name: shipyardhq
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: shipyardhq
spec:
  replicas: 1
  progressDeadlineSeconds: 4200
  selector:
    matchLabels:
      app.kubernetes.io/name: shipyardhq
      app.kubernetes.io/component: worker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shipyardhq
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: shipyardhq
        shipyardhq-psql-client: "true"
        shipyardhq-rollout-waiter: "true"
    spec:
      serviceAccountName: shipyardhq-worker
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-web-rollout
          image: rancher/kubectl:v1.35.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/kubectl
          args:
            - rollout
            - status
            - deployment
            - $(DEPLOYMENT_NAME)
          env:
            - name: DEPLOYMENT_NAME
              value: shipyardhq
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
      containers:
        - name: worker
          # renovate: datasource=docker depName=ghcr.io/abhi1693/shipyardhq
          image: registry.home/ghcr.io/abhi1693/shipyardhq:1.4.98
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - worker
          envFrom:
            - secretRef:
                name: shipyardhq
            - configMapRef:
                name: shipyardhq
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=1024
            - name: PG_APPLICATION_NAME
              value: shipyardhq-worker
            - name: OTEL_SERVICE_NAME
              value: shipyardhq-worker
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
              value: http/protobuf
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/metrics
            - name: OTEL_BSP_MAX_QUEUE_SIZE
              value: "512"
            - name: OTEL_BSP_MAX_EXPORT_BATCH_SIZE
              value: "128"
            - name: OTEL_BSP_SCHEDULE_DELAY
              value: "10000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=shipyard,deployment.environment.name=production,service.instance.id=$(POD_NAME),k8s.namespace.name=shipyardhq,k8s.deployment.name=shipyardhq-worker,k8s.pod.name=$(POD_NAME),k8s.container.name=worker
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.cattle-monitoring-system.svc.cluster.local:4040
            - name: PYROSCOPE_APPLICATION_NAME
              value: shipyardhq
            - name: PYROSCOPE_TAG_PROCESS_ROLE
              value: worker
            - name: PYROSCOPE_FLUSH_INTERVAL_MS
              value: "60000"
            - name: PYROSCOPE_WALL_SAMPLING_INTERVAL_MICROS
              value: "10000"
            - name: PYROSCOPE_WALL_COLLECT_CPU_TIME
              value: "false"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: shipyardhq-postgresql
                  key: dbname
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
            - name: DIRECT_DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-shipyardhq-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
          resources:
            requests:
              cpu: 60m
              memory: 608Mi
            limits:
              memory: 896Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
