apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardn-hub-codex-app-server
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-codex-app-server
    app.kubernetes.io/component: codex-app-server
    app.kubernetes.io/part-of: wardn-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wardn-hub-codex-app-server
      app.kubernetes.io/component: codex-app-server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        home-lab.io/codex-app-server-wrapper-revision: "2026-07-10-tini-reaper"
      labels:
        app.kubernetes.io/name: wardn-hub-codex-app-server
        app.kubernetes.io/component: codex-app-server
        app.kubernetes.io/part-of: wardn-hub
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: arm64
      hostAliases:
        - ip: "172.64.146.15"
          hostnames:
            - auth.openai.com
        - ip: "104.18.41.241"
          hostnames:
            - auth.openai.com
      volumes:
        - name: codex-runtime-home
          emptyDir:
            sizeLimit: 2Gi
        - name: codex-home
          persistentVolumeClaim:
            claimName: wardn-hub-codex-home
      containers:
        - name: codex-app-server
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-codex-app-server
          image: registry.home/ghcr.io/abhi1693/wardn-hub-codex-app-server:0.2.90
          imagePullPolicy: IfNotPresent
          env:
            - name: CODEX_HOME
              value: /codex-home
            - name: CODEX_PERSISTENT_HOME
              value: /codex-auth
            - name: HOME
              value: /tmp/codex-user
            - name: NO_UPDATE_NOTIFIER
              value: "1"
            - name: TMPDIR
              value: /tmp/codex-tmp
            - name: CODEX_WORKDIR
              value: /tmp/codex-work
            - name: CODEX_MODEL
              value: gpt-5.4-mini
            - name: CODEX_MODEL_REASONING_EFFORT
              value: medium
            - name: CODEX_WEB_SEARCH_MODE
              value: live
            - name: CODEX_HISTORY_PERSISTENCE
              value: none
            - name: CODEX_UNIFIED_EXEC
              value: "false"
            - name: CODEX_SHELL_SNAPSHOT
              value: "false"
            - name: CODEX_ANALYTICS_ENABLED
              value: "true"
            - name: CODEX_OTEL_ENVIRONMENT
              value: production
            - name: CODEX_OTEL_EXPORTER
              value: none
            - name: CODEX_OTEL_LOG_USER_PROMPT
              value: "false"
            - name: CODEX_OTEL_TRACE_EXPORTER
              value: otlp-http
            - name: CODEX_OTEL_TRACE_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/traces
            - name: CODEX_OTEL_TRACE_PROTOCOL
              value: binary
            - name: CODEX_OTEL_METRICS_EXPORTER
              value: otlp-http
            - name: CODEX_OTEL_METRICS_ENDPOINT
              value: http://opentelemetry-collector.cattle-monitoring-system.svc.cluster.local:4318/v1/metrics
            - name: CODEX_OTEL_METRICS_PROTOCOL
              value: binary
            - name: RUST_LOG
              value: codex_app_server=debug,codex_core=debug,codex_api=debug,codex_models_manager=debug,rmcp=info,warn
            - name: CODEX_STATUS_TIMEOUT_SECONDS
              value: "15"
            - name: CODEX_LOGIN_FAILURE_SLEEP_SECONDS
              value: "600"
            - name: WARDN_HUB_CODEX_APP_SERVER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wardn-hub
                  key: WARDN_HUB_CODEX_APP_SERVER_AUTH_TOKEN
          ports:
            - name: websocket
              containerPort: 41237
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: websocket
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 720
          readinessProbe:
            tcpSocket:
              port: websocket
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: websocket
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            privileged: true
            runAsGroup: 0
            runAsUser: 0
            seccompProfile:
              type: Unconfined
          volumeMounts:
            - name: codex-runtime-home
              mountPath: /codex-home
            - name: codex-home
              mountPath: /codex-auth
