apiVersion: batch/v1
kind: Job
metadata:
  name: wardn-hub-next-build
  namespace: wardn
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "5"
  labels:
    app.kubernetes.io/name: wardn-hub-frontend
    app.kubernetes.io/component: next-builder
    app.kubernetes.io/part-of: wardn-hub
spec:
  activeDeadlineSeconds: 3600
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wardn-hub-frontend
        app.kubernetes.io/component: next-builder
        app.kubernetes.io/part-of: wardn-hub
        wardn-hub-api-client: "true"
        wardn-hub-api-rollout-waiter: "true"
    spec:
      automountServiceAccountToken: false
      serviceAccountName: wardn-hub-api-rollout-waiter
      restartPolicy: Never
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: wait-for-api-rollout
          # renovate: datasource=github-releases depName=abhi1693/wardn-hub
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.69
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /opt/wardn/wait-for-api-rollout.py
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: api-rollout-script
              mountPath: /opt/wardn/wait-for-api-rollout.py
              subPath: wait-for-api-rollout.py
              readOnly: true
            - name: api-rollout-token
              mountPath: /var/run/secrets/wardn-hub-api-rollout
              readOnly: true
      containers:
        - name: build-next-app
          # renovate: datasource=github-releases depName=abhi1693/wardn-hub
          image: registry.home/ghcr.io/abhi1693/wardn-hub-frontend:0.2.69
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              cache_version=next-build-v7
              cache_root=/app/hub/frontend/.next-build-cache
              artifact_root="$cache_root/artifacts"
              build_root=/app/hub/frontend/.next
              standalone_app="$build_root/standalone/hub/frontend"

              mkdir -p "$artifact_root" "$build_root"

              source_key="$(
                {
                  for path in app components hooks lib public; do
                    [ -d "$path" ] && find "$path" -type f -print0
                  done
                  for path in next.config.ts package.json postcss.config.mjs proxy.ts tsconfig.json; do
                    [ -f "$path" ] && printf '%s\0' "$path"
                  done
                } | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}'
              )"
              env_key="$(
                env | LC_ALL=C sort \
                  | grep -E '^(CLERK_|NEXT_PUBLIC_|WARDN_HUB_API_INTERNAL_BASE_URL)=' \
                  | sha256sum | awk '{print $1}'
              )"
              build_key="$(printf '%s\n%s\n%s\n' "$cache_version" "$source_key" "$env_key" | sha256sum | awk '{print $1}')"
              artifact="$artifact_root/$build_key.tar.gz"
              ready="$artifact_root/$build_key.ready"

              clear_build_root() {
                rm -rf "$build_root"/* "$build_root"/.[!.]* "$build_root"/..?* 2>/dev/null || true
                mkdir -p "$build_root"
              }

              if [ -f "$ready" ] && [ -s "$artifact" ]; then
                echo "Next.js build artifact $build_key already exists."
                exit 0
              fi

              echo "Building Wardn Hub Next.js artifact $build_key..."
              clear_build_root
              npm run build
              rm -rf "$standalone_app/public" "$standalone_app/.next/static"
              mkdir -p "$standalone_app/.next"
              if [ -d public ]; then
                cp -R public "$standalone_app/public"
              fi
              cp -R .next/static "$standalone_app/.next/static"

              tmp_artifact="$artifact.tmp.$$"
              rm -f "$tmp_artifact"
              (
                cd "$build_root"
                find . -mindepth 1 -maxdepth 1 -print0 | tar --null --create --gzip --file "$tmp_artifact" --files-from -
              )
              mv "$tmp_artifact" "$artifact"
              touch "$ready"
              echo "Next.js build artifact $build_key is ready."
          envFrom:
            - configMapRef:
                name: wardn-hub
            - secretRef:
                name: wardn-hub
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "3"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          volumeMounts:
            - name: next-build
              mountPath: /app/hub/frontend/.next
            - name: next-build-cache
              mountPath: /app/hub/frontend/.next-build-cache
      volumes:
        - name: api-rollout-script
          configMap:
            name: wardn-hub-api-rollout-waiter
            defaultMode: 0444
        - name: api-rollout-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 1800
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
        - name: next-build
          emptyDir:
            sizeLimit: 2Gi
        - name: next-build-cache
          persistentVolumeClaim:
            claimName: wardn-hub-next-build-cache
