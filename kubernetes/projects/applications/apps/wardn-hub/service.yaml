---
apiVersion: v1
kind: Service
metadata:
  name: wardn-hub-api
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: wardn-hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-hub-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wardn-hub-frontend
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: wardn-hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-hub-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wardn-hub-scoring
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-scoring
    app.kubernetes.io/component: scoring
    app.kubernetes.io/part-of: wardn-hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-hub-scoring
    app.kubernetes.io/component: scoring
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wardn-hub-codex-app-server
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-codex-app-server
    app.kubernetes.io/component: codex-app-server
    app.kubernetes.io/part-of: wardn-hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-hub-codex-app-server
    app.kubernetes.io/component: codex-app-server
  ports:
    - name: websocket
      port: 41237
      targetPort: websocket
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wardn-hub-events-worker
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-events-worker
    app.kubernetes.io/component: events-worker
    app.kubernetes.io/part-of: wardn-hub
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-hub-events-worker
    app.kubernetes.io/component: events-worker
  ports:
    - name: metrics
      port: 8092
      targetPort: metrics
      protocol: TCP
