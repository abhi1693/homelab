---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wardn-hub
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: wardn-hub
    home-lab.io/project-slug: applications
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - wardn
  selector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - wardn-hub-api
          - wardn-hub-events-worker
          - wardn-hub-review-webhook
          - wardn-hub-fix-rejected-webhook
  endpoints:
    - port: http
      path: /metrics
      interval: 60s
      scrapeTimeout: 20s
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_service_label_app_kubernetes_io_component
          targetLabel: component
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_service_label_app_kubernetes_io_component
          targetLabel: component
