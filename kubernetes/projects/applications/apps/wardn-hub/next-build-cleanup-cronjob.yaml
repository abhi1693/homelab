apiVersion: batch/v1
kind: CronJob
metadata:
  name: wardn-hub-next-build-cache-cleanup
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-frontend
    app.kubernetes.io/component: next-build-cleanup
    app.kubernetes.io/part-of: wardn-hub
spec:
  schedule: "31 3 */3 * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wardn-hub-frontend
            app.kubernetes.io/component: next-build-cleanup
            app.kubernetes.io/part-of: wardn-hub
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: harbor-registry
          nodeSelector:
            kubernetes.io/arch: arm64
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: cleanup-next-build-cache
              # renovate: datasource=github-releases depName=abhi1693/wardn-hub
              image: registry.home/ghcr.io/abhi1693/wardn-hub-frontend:0.2.95
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -eu

                  cache_version=next-build-v7
                  cache_root=/app/hub/frontend/.next-build-cache
                  artifact_root="$cache_root/artifacts"

                  mkdir -p "$artifact_root"

                  source_key="$(
                    {
                      for path in app components hooks lib public; do
                        [ -d "$path" ] && find "$path" -type f -print0
                      done
                      for path in next.config.ts package.json postcss.config.mjs proxy.ts tsconfig.json; do
                        [ -f "$path" ] && printf '%s\0' "$path"
                      done
                    } | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}'
                  )"
                  env_key="$(
                    env | LC_ALL=C sort \
                      | grep -E '^(CLERK_|NEXT_PUBLIC_|WARDN_HUB_API_INTERNAL_BASE_URL)=' \
                      | sha256sum | awk '{print $1}'
                  )"
                  build_key="$(printf '%s\n%s\n%s\n' "$cache_version" "$source_key" "$env_key" | sha256sum | awk '{print $1}')"
                  artifact="$artifact_root/$build_key.tar.gz"
                  ready="$artifact_root/$build_key.ready"

                  if [ ! -f "$ready" ] || [ ! -s "$artifact" ]; then
                    echo "Current Next.js build artifact $build_key is not ready; skipping cleanup."
                    exit 0
                  fi

                  echo "Keeping current Next.js build artifact $build_key."
                  find "$artifact_root" -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.ready' \) \
                    ! -name "$build_key.tar.gz" \
                    ! -name "$build_key.ready" \
                    -print -delete
              envFrom:
                - configMapRef:
                    name: wardn-hub
                - secretRef:
                    name: wardn-hub
              env:
                - name: NODE_OPTIONS
                  value: --max-old-space-size=512
                - name: NPM_CONFIG_CACHE
                  value: /tmp/.npm
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1001
                runAsNonRoot: true
                runAsUser: 1001
              volumeMounts:
                - name: next-build-cache
                  mountPath: /app/hub/frontend/.next-build-cache
          volumes:
            - name: next-build-cache
              persistentVolumeClaim:
                claimName: wardn-hub-next-build-cache
