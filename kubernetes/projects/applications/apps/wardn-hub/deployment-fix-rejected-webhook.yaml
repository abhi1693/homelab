apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardn-hub-fix-rejected-webhook
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-hub-fix-rejected-webhook
    app.kubernetes.io/component: fix-rejected-webhook
    app.kubernetes.io/part-of: wardn-hub
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: wardn-hub-fix-rejected-webhook
      app.kubernetes.io/component: fix-rejected-webhook
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wardn-hub-fix-rejected-webhook
        app.kubernetes.io/component: fix-rejected-webhook
        app.kubernetes.io/part-of: wardn-hub
        wardn-hub-api-client: "true"
        wardn-hub-api-rollout-waiter: "true"
        wardn-hub-valkey-client: "true"
    spec:
      automountServiceAccountToken: false
      serviceAccountName: wardn-hub-api-rollout-waiter
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      initContainers:
        - name: wait-for-api-rollout
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-backend
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.66
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /opt/wardn/wait-for-api-rollout.py
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: api-rollout-script
              mountPath: /opt/wardn/wait-for-api-rollout.py
              subPath: wait-for-api-rollout.py
              readOnly: true
            - name: api-rollout-token
              mountPath: /var/run/secrets/wardn-hub-api-rollout
              readOnly: true
        - name: wait-for-codex-login
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-backend
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.66
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              for attempt in $(seq 1 180); do
                if codex login status; then
                  exit 0
                fi
                echo "Waiting for shared Codex login in /app/.codex (${attempt}/180)..."
                sleep 10
              done
              echo "Timed out waiting for shared Codex login."
              exit 1
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: codex-config
              mountPath: /app/.codex
        - name: sync-event-rule
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-backend
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.66
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
          args:
            - |
              import os
              import sys
              import time

              import httpx

              name = "Rejected submission fixer"
              base_url = os.environ["WARDN_HUB_API_INTERNAL_BASE_URL"].rstrip("/")
              webhook_url = os.environ["WARDN_HUB_FIX_REJECTED_WEBHOOK_URL"]
              token = os.environ["WARDN_HUB_TOKEN"]
              signing_secret = os.environ["WARDN_HUB_FIX_REJECTED_WEBHOOK_SECRET"]
              headers = {"Authorization": f"Bearer {token}"}
              payload = {
                  "name": name,
                  "description": "Automatically fixes draft or rejected MCP server submissions for the owning token user.",
                  "isEnabled": True,
                  "eventTypes": ["submission.created", "submission.updated", "submission.rejected"],
                  "conditions": {},
                  "actionType": "webhook",
                  "actionConfig": {
                      "url": webhook_url,
                      "signingSecret": signing_secret,
                  },
                  "failurePolicy": {},
              }

              last_error = None
              for _attempt in range(24):
                  try:
                      with httpx.Client(timeout=30) as client:
                          response = client.get(f"{base_url}/api/v1/events/rules", headers=headers)
                          response.raise_for_status()
                          rules = response.json().get("rules", [])
                          existing = next((rule for rule in rules if rule.get("name") == name), None)
                          if existing:
                              response = client.put(
                                  f"{base_url}/api/v1/events/rules/{existing['id']}",
                                  headers=headers,
                                  json=payload,
                              )
                          else:
                              response = client.post(
                                  f"{base_url}/api/v1/events/rules",
                                  headers=headers,
                                  json=payload,
                              )
                          response.raise_for_status()
                          print(f"Synced event rule: {name}", flush=True)
                          sys.exit(0)
                  except Exception as exc:
                      last_error = exc
                      print(f"Waiting to sync event rule: {exc}", file=sys.stderr, flush=True)
                      time.sleep(5)
              raise SystemExit(f"Failed to sync event rule: {last_error}")
          envFrom:
            - configMapRef:
                name: wardn-hub
            - secretRef:
                name: wardn-hub-fix-rejected-webhook
          env:
            - name: WARDN_HUB_FIX_REJECTED_WEBHOOK_URL
              value: http://wardn-hub-fix-rejected-webhook.wardn.svc.cluster.local:8091/webhooks/wardn/rejected-submission-fix
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
      volumes:
        - name: api-rollout-script
          configMap:
            name: wardn-hub-api-rollout-waiter
            defaultMode: 0444
        - name: api-rollout-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 1800
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
        - name: codex-config
          persistentVolumeClaim:
            claimName: wardn-hub-codex-config
      containers:
        - name: fix-rejected-webhook
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-backend
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.66
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.cli.fix_rejected_submission_webhook
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8091"
            - --url
            - http://wardn-hub-api.wardn.svc.cluster.local:8080
            - --review-timeout
            - "1200"
            - --review-progress-interval
            - "30"
            - --model
            - gpt-5.4-mini
            - --verbose
          envFrom:
            - configMapRef:
                name: wardn-hub
            - secretRef:
                name: wardn-hub-fix-rejected-webhook
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WARDN_HUB_OTEL_SERVICE_NAME
              value: wardn-hub-fix-rejected-webhook
            - name: WARDN_HUB_OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=wardn-hub,deployment.environment.name=production,service.instance.id=$(POD_NAME),k8s.namespace.name=wardn,k8s.deployment.name=wardn-hub-fix-rejected-webhook,k8s.pod.name=$(POD_NAME),k8s.container.name=fix-rejected-webhook
          ports:
            - name: http
              containerPort: 8091
              protocol: TCP
          resources:
            requests:
              cpu: 85m
              memory: 256Mi
            limits:
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: codex-config
              mountPath: /app/.codex
