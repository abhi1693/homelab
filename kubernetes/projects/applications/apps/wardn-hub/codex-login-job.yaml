apiVersion: batch/v1
kind: Job
metadata:
  name: wardn-hub-codex-login
  namespace: wardn
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-20"
  labels:
    app.kubernetes.io/name: wardn-hub-codex-login
    app.kubernetes.io/component: codex-login
    app.kubernetes.io/part-of: wardn-hub
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wardn-hub-codex-login
        app.kubernetes.io/component: codex-login
        app.kubernetes.io/part-of: wardn-hub
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      volumes:
        - name: codex-config
          persistentVolumeClaim:
            claimName: wardn-hub-codex-config
      containers:
        - name: codex-login
          # renovate: datasource=docker depName=ghcr.io/abhi1693/wardn-hub-backend
          image: registry.home/ghcr.io/abhi1693/wardn-hub-backend:0.2.66
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              mkdir -p /app/.codex
              if ! codex login status; then
                echo "Codex is not logged in. Starting device login; complete the browser login shown below."
                codex login --device-auth
              fi
              codex login status
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: codex-config
              mountPath: /app/.codex
