---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secrets.sops.yaml
  - registry-secrets.sops.yaml
  - namespace.yaml
  - grafana-dashboard.yaml
  - helmop.yaml
  - networkpolicy.yaml
configMapGenerator:
  - name: harbor-values
    files:
      - values.yaml
generatorOptions:
  labels:
    app.kubernetes.io/name: harbor
    app.kubernetes.io/part-of: harbor
    home-lab.io/project-slug: applications
configurations:
  - kustomizeconfig.yaml
