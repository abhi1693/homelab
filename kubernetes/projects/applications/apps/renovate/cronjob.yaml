---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
    app.kubernetes.io/part-of: renovate
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
            app.kubernetes.io/part-of: renovate
        spec:
          serviceAccountName: renovate
          restartPolicy: Never
          hostAliases:
            - ip: 10.43.129.91
              hostnames:
                - registry.home
          imagePullSecrets:
            - name: harbor-registry
          securityContext:
            runAsNonRoot: true
            runAsUser: 12021
            runAsGroup: 12021
            fsGroup: 12021
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              # renovate: datasource=github-releases depName=renovatebot/renovate
              image: registry.home/docker.io/renovate/renovate:43.255.2
              imagePullPolicy: IfNotPresent
              env:
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_CONFIG_FILE
                  value: /etc/renovate/config.js
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                - name: NODE_OPTIONS
                  value: --dns-result-order=ipv4first --no-network-family-autoselection
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate
                      key: RENOVATE_TOKEN
                - name: HARBOR_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: renovate
                      key: HARBOR_USERNAME
                - name: HARBOR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: renovate
                      key: HARBOR_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: config
                  mountPath: /etc/renovate
                  readOnly: true
                - name: workdir
                  mountPath: /tmp/renovate
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: workdir
              emptyDir: {}
