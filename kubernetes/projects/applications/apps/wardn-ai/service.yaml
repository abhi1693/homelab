---
apiVersion: v1
kind: Service
metadata:
  name: wardn-ai-api
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-ai-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: wardn-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-ai-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: wardn-ai-frontend
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-ai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: wardn-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wardn-ai-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
