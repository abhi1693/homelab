---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-home
  namespace: wardn
  labels:
    app.kubernetes.io/name: wardn-ai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: wardn-ai
spec:
  secretName: wildcard-home-tls
  commonName: "*.home"
  dnsNames:
    - "*.home"
    - home
    - ai.home
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: home-local-ca
    kind: ClusterIssuer
    group: cert-manager.io
