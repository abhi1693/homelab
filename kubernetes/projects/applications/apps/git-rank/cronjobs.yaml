apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-rank-sync-daily
  namespace: git-rank
  labels:
    app.kubernetes.io/name: git-rank-sync-daily
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: git-rank
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: git-rank-sync-daily
            app.kubernetes.io/component: scheduler
            app.kubernetes.io/part-of: git-rank
            git-rank-psql-client: "true"
            git-rank-valkey-client: "true"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: harbor-registry
          nodeSelector:
            kubernetes.io/arch: arm64
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: trigger
              # renovate: datasource=docker depName=ghcr.io/abhi1693/git-rank-backend
              image: registry.home/ghcr.io/abhi1693/git-rank-backend:1.2.34
              imagePullPolicy: IfNotPresent
              command:
                - python
                - scripts/trigger-jobs.py
                - sync_fanout
                - leaderboard_daily
              envFrom:
                - secretRef:
                    name: git-rank
                - configMapRef:
                    name: git-rank
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: git-rank-postgresql
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: git-rank-postgresql
                      key: password
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: git-rank-postgresql
                      key: dbname
                - name: DATABASE_URL
                  value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-git-rank-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
---
