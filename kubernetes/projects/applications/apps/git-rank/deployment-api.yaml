apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-rank-api
  namespace: git-rank
  labels:
    app.kubernetes.io/name: git-rank-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: git-rank
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: git-rank-api
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        home-lab.io/config-revision: git-rank-db-pool-20260630
      labels:
        app.kubernetes.io/name: git-rank-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: git-rank
        git-rank-psql-client: "true"
        git-rank-valkey-client: "true"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: git-rank-api
                  app.kubernetes.io/component: api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: git-rank-api
              app.kubernetes.io/component: api
      containers:
        - name: api
          image: registry.home/git-rank/backend:1.2.24 # {"$imagescan": "git-rank-backend"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: git-rank
            - configMapRef:
                name: git-rank
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: git-rank-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: git-rank-postgresql
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: git-rank-postgresql
                  key: dbname
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-pooler-git-rank-rw.postgresql.svc.cluster.local:5432/$(POSTGRES_DB)?sslmode=disable
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 144Mi
            limits:
              memory: 224Mi
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
