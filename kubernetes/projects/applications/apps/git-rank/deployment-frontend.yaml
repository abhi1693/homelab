apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-rank-frontend
  namespace: git-rank
  labels:
    app.kubernetes.io/name: git-rank-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: git-rank
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: git-rank-frontend
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git-rank-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: git-rank
        git-rank-api-client: "true"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-registry
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: git-rank-frontend
                  app.kubernetes.io/component: frontend
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: git-rank-frontend
              app.kubernetes.io/component: frontend
      containers:
        - name: frontend
          image: registry.home/git-rank/frontend:1.2.26 # {"$imagescan": "git-rank-frontend"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: git-rank
          env:
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: git-rank
                  key: CLERK_SECRET_KEY
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 240Mi
            limits:
              memory: 352Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
