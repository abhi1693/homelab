---
apiVersion: v1
kind: Service
metadata:
  name: git-rank-api
  namespace: git-rank
  labels:
    app.kubernetes.io/name: git-rank-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: git-rank
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: git-rank-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: git-rank-frontend
  namespace: git-rank
  labels:
    app.kubernetes.io/name: git-rank-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: git-rank
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: git-rank-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
