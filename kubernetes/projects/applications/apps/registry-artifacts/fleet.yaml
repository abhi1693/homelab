---
name: registry-artifacts
defaultNamespace: registry-artifacts
labels:
  app.kubernetes.io/name: registry-artifacts
  app.kubernetes.io/part-of: harbor
  home-lab.io/project-slug: applications
imageScans:
  - image: registry.home/registry-artifacts/registry-artifacts
    tagName: registry-artifacts
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=0.0.0 <1.0.0"
  - image: registry.home/ghcr.io/cloudnative-pg/postgresql
    tagName: registry-artifacts-postgresql
    interval: 10m0s
    secretRef:
      name: harbor-registry
    policy:
      semver:
        range: ">=17.0.0 <18.0.0"
dependsOn:
  - name: rancher-project-applications
  - name: postgresql
  - name: postgresql-networkpolicy
  - name: postgresql-pooler-pdb
helm:
  takeOwnership: true
