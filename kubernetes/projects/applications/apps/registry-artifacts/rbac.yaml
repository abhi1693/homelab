---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: registry-artifacts
  namespace: registry-artifacts
  labels:
    app.kubernetes.io/name: registry-artifacts
    app.kubernetes.io/part-of: harbor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: registry-artifacts-imagescan-reader
  labels:
    app.kubernetes.io/name: registry-artifacts
    app.kubernetes.io/part-of: harbor
rules:
  - apiGroups:
      - fleet.cattle.io
    resources:
      - imagescans
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: registry-artifacts-imagescan-reader
  labels:
    app.kubernetes.io/name: registry-artifacts
    app.kubernetes.io/part-of: harbor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: registry-artifacts-imagescan-reader
subjects:
  - kind: ServiceAccount
    name: registry-artifacts
    namespace: registry-artifacts
