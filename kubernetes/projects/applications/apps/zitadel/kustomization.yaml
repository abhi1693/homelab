---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - secrets.sops.yaml
  - helmop.yaml
  - networkpolicy.yaml
configMapGenerator:
  - name: zitadel-values
    files:
      - values.yaml
generatorOptions:
  labels:
    app.kubernetes.io/name: zitadel
    app.kubernetes.io/part-of: zitadel
    home-lab.io/project-slug: applications
configurations:
  - kustomizeconfig.yaml
