apiVersion: batch/v1
kind: CronJob
metadata:
  name: indexly-poll-sitemaps
  namespace: indexly
  labels:
    app.kubernetes.io/name: indexly
    app.kubernetes.io/component: cron
    app.kubernetes.io/part-of: indexly
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: indexly
            app.kubernetes.io/component: cron
            app.kubernetes.io/part-of: indexly
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: curl
              # renovate: datasource=github-releases depName=curl/curl-container
              image: registry.home/docker.io/curlimages/curl:8.21.0
              imagePullPolicy: IfNotPresent
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: indexly
                      key: CRON_SECRET
              args:
                - -fsS
                - -H
                - "Authorization: Bearer $(CRON_SECRET)"
                - "http://indexly.indexly.svc.cluster.local:3000/api/tasks/poll-sitemaps"
              resources:
                requests:
                  cpu: 2m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 100
                runAsGroup: 101
---
