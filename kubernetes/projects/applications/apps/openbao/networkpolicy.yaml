---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openbao-ingress
  namespace: wardn
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: openbao
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: openbao
      component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8200
