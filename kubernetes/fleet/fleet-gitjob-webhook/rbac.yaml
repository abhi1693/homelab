---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitjob-core-events
  namespace: cattle-fleet-system
  labels:
    app.kubernetes.io/name: fleet-gitjob-webhook
    app.kubernetes.io/part-of: fleet
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitjob-core-events
  namespace: cattle-fleet-system
  labels:
    app.kubernetes.io/name: fleet-gitjob-webhook
    app.kubernetes.io/part-of: fleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitjob-core-events
subjects:
  - kind: ServiceAccount
    name: gitjob
    namespace: cattle-fleet-system
